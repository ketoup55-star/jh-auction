<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>게시판 — JH옥션스쿨</title>
<link href="https://cdn.jsdelivr.net/npm/suneditor@2.45.1/dist/css/suneditor.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/suneditor@2.45.1/dist/suneditor.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/suneditor@2.45.1/src/lang/ko.js"></script>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#dfe3ea;--text:#1c1c1a;--muted:#6b6a64;
        --primary:#1f4fa3;--labeltx:#2c5db0;--danger:#c0392b;--label:#eef2fb;--hotred:#e8202a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  a{color:inherit;}
  .sitehead{position:sticky;top:0;z-index:50;}
  .top{background:var(--card);border-bottom:1px solid var(--line);}
  .topin{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px;}
  .minicase{display:flex;align-items:center;gap:6px;}
  .minicase .t{font-weight:600;color:var(--primary);font-size:13px;white-space:nowrap;}
  .minicase .ty{color:var(--muted);font-size:13px;white-space:nowrap;}
  .minicase select,.minicase input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;}
  .minicase input{width:150px;}
  .minicase .csearch{height:30px;width:34px;border:1px solid var(--primary);background:var(--primary);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;}
  .brand{flex:1;text-align:center;font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--primary);text-decoration:none;}
  .brand span{color:#3a7bd5;}
  .util{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;}
  .util a{color:var(--muted);text-decoration:none;}
  .util .pay{color:var(--danger);font-weight:600;}
  .nav{background:var(--card);border-bottom:2px solid var(--primary);}
  .navin{max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap;}
  .nav a{padding:14px 18px;font-size:15px;font-weight:600;color:#333;text-decoration:none;}
  .nav a:hover,.nav a.on{color:var(--primary);}
  .wrap{max-width:1180px;margin:18px auto 60px;padding:0 16px;}
  .phead{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 4px;}
  .phead h1{font-size:23px;font-weight:700;margin:0;}
  .phead .desc{color:var(--muted);font-size:13px;margin-left:12px;}
  .crumb{font-size:12px;color:var(--muted);}.crumb b{color:var(--primary);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-top:14px;overflow:hidden;}
  /* 글쓰기 카드: 에디터 드롭다운(글자크기 등)이 카드 밖으로 나와도 잘리지 않게 */
  .card.edcard{overflow:visible;}
  .sun-editor{z-index:30;}
  .sun-editor .se-list-layer,.sun-editor .se-submenu{z-index:60;}
  /* 목록 */
  .btbl{width:100%;border-collapse:collapse;font-size:13.5px;}
  .btbl th{background:#f2f5fa;color:#333;font-weight:700;padding:12px 8px;border-bottom:2px solid var(--primary);text-align:center;}
  .btbl td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:center;color:var(--muted);}
  .btbl td.tt{text-align:left;color:var(--text);font-weight:500;}
  .btbl tr:hover td{background:#fafbfd;}
  .btbl td.tt a{text-decoration:none;}
  .btbl td.tt a:hover{color:var(--primary);text-decoration:underline;}
  .btbl .empty{padding:50px;color:var(--muted);text-align:center;}
  .btbl .new{display:inline-block;margin-left:6px;color:#fff;background:var(--hotred);font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;vertical-align:middle;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .toolbar .tot{font-size:13px;color:var(--muted);}.toolbar .tot b{color:var(--hotred);}
  .btn{height:38px;padding:0 22px;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
  .btn.b{background:var(--primary);color:#fff;}.btn.b:hover{background:#163c80;}
  .btn.g{background:#fff;color:var(--text);border:1px solid var(--line);}.btn.g:hover{background:#f3f5f8;}
  .btn.r{background:var(--danger);color:#fff;}.btn.r:hover{background:#a93226;}
  .pager{display:flex;gap:5px;justify-content:center;margin-top:18px;}
  .pager button{min-width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text);}
  .pager button.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700;}
  .pager button:disabled{opacity:.4;cursor:default;}
  /* 보기 */
  .vhead{padding:18px 20px;border-bottom:1px solid var(--line);}
  .vhead .vt{font-size:19px;font-weight:700;}
  .vhead .vm{margin-top:8px;color:var(--muted);font-size:12px;display:flex;gap:16px;flex-wrap:wrap;}
  .vbody{padding:24px 20px;min-height:200px;font-size:14px;line-height:1.8;word-break:break-word;}
  .vbody img{max-width:100%;height:auto;}
  .vbody table{border-collapse:collapse;}.vbody table td,.vbody table th{border:1px solid var(--line);padding:6px 9px;}
  .vbody a{color:var(--primary);text-decoration:underline;}
  .vbody blockquote{border-left:3px solid var(--line);margin:10px 0;padding:4px 14px;color:var(--muted);}
  .vfoot{display:flex;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--line);}
  /* 글쓰기 */
  .form{padding:20px;}
  .form label{display:block;font-weight:700;margin:0 0 6px;font-size:13px;}
  .form input,.form textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:10px 12px;font-size:14px;font-family:inherit;}
  .form textarea{min-height:300px;resize:vertical;margin-top:4px;}
  .form .frow{margin-bottom:16px;}
  .form .fbtns{display:flex;gap:8px;justify-content:flex-end;}
  .loginbox{padding:50px;text-align:center;color:var(--muted);font-size:14px;}
  .loginbox a{color:var(--primary);font-weight:700;}
  /* 잠금(강의 등급제한) */
  .lock{padding:54px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.8;}
  .lock .ic{font-size:34px;}.lock b{color:var(--primary);}
  .lock a{display:inline-block;margin-top:14px;}
  /* 댓글 */
  .cmts{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-top:14px;overflow:hidden;}
  .cmts .ch{padding:12px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px;}
  .cmts .ch b{color:var(--primary);}
  .clist{list-style:none;margin:0;padding:0;}
  .clist li{padding:13px 18px;border-bottom:1px solid var(--line);}
  .clist li:last-child{border-bottom:none;}
  .clist .cmeta{font-size:12px;color:var(--muted);margin-bottom:5px;display:flex;gap:10px;align-items:center;}
  .clist .cmeta .nm{font-weight:700;color:var(--text);}
  .clist .cmeta .cdel{margin-left:auto;color:var(--danger);background:none;border:none;cursor:pointer;font-size:11px;}
  .clist .ctext{font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .clist .cempty{padding:22px;text-align:center;color:var(--muted);}
  .cwrite{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--line);background:#fafbfc;}
  .cwrite textarea{flex:1;min-height:46px;border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:13.5px;font-family:inherit;resize:vertical;}
  .cwrite button{flex:0 0 84px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;}
  .cwrite button:hover{background:#163c80;}
  .cguide{padding:14px 18px;border-top:1px solid var(--line);background:#fafbfc;color:var(--muted);font-size:12.5px;text-align:center;}
  .cguide a{color:var(--primary);font-weight:700;}
  @media(max-width:720px){ .btbl .hideM{display:none} }
  /* 부동산DB '전국' 스티커 — 점멸 + hover 시 좌우 기울기(프리미엄 스티커와 동일 형식) */
  @keyframes natlBlink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes natlWobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}55%{transform:rotate(9deg)}80%{transform:rotate(-4deg)}}
  .natllink{position:relative;}
  .natl-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;
    background:linear-gradient(180deg,#3f7ce2,#1f4fa3);border:1px solid #1a4590;border-radius:5px;
    padding:1px 7px;line-height:16px;white-space:nowrap;
    animation:natlBlink 1.5s ease-in-out infinite;transform-origin:center;
    position:absolute;top:3px;right:-15px;box-shadow:0 1px 5px rgba(20,60,120,.45);z-index:3;}
  .natllink:hover>.natl-badge{animation:natlWobble .55s ease-in-out;}
  @media(prefers-reduced-motion:reduce){.natl-badge{animation:none!important;}}
</style>
</head>
<body>
<div class="sitehead">
  <div class="top"><div class="topin">
    <div class="minicase">
      <span class="t">사건검색</span>
      <select id="caseYear"><option value="">전체</option></select>
      <span class="ty">타경</span>
      <input type="text" id="caseNoIn" placeholder="타경 번호" onkeydown="if(event.key==='Enter')caseSearch()">
      <button class="csearch" onclick="caseSearch()" aria-label="검색">🔍</button>
    </div>
    <a class="brand" href="/">JH<span>옥션스쿨</span></a>
    <div class="util" id="util">
      <a href="/static/login.html">로그인</a>
      <a href="/static/login.html?tab=signup">회원가입</a>
      <a href="/static/mypage.html">마이페이지</a>
      <a href="/static/payment.html" class="pay">요금결제</a>
    </div>
  </div></div>
  <div class="nav"><div class="navin">
    <a href="/static/auctions.html">경매검색</a>
    <a href="/static/board.html?b=yejung" data-b="yejung">예정</a>
    <a href="/static/gongmae.html">공매</a>
    <a href="/static/board.html?b=video" data-b="video">강의</a>
    <a href="/static/board.html?b=community" data-b="community">커뮤니티</a>
    <a href="/static/board.html?b=data" data-b="data">경매자료실</a><a class="natllink" href="/static/kbdb.html">부동산DB<span class="natl-badge">전국</span></a>
    <a href="/static/board.html?b=support" data-b="support">고객센터</a>
    <a href="/static/mypage.html">마이페이지</a>
  </div></div>
</div>

<div class="wrap">
  <div class="phead">
    <h1 id="bTitle">게시판 <span class="desc" id="bDesc"></span></h1>
    <div class="crumb">🏠 &nbsp;›&nbsp; <b id="bCrumb">게시판</b></div>
  </div>
  <div id="view"></div>
</div>

<script>
const P=new URLSearchParams(location.search);
let B=P.get("b")||"community", MODE=P.get("write")?"write":(P.get("id")?"view":"list");
let PAGE=+(P.get("page")||1), META={};

const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtDate=s=>(s||"").slice(0,10).replace(/-/g,".");
function go(params){ const u=new URLSearchParams({b:B,...params}); location.href="/static/board.html?"+u.toString(); }

// 헤더 연도 + 로그인 상태 + 현재 메뉴 강조
(function(){ const s=document.getElementById("caseYear");
  const n=new Date().getFullYear(); for(let y=n;y>=2008;y--){const o=document.createElement("option");o.value=y;o.textContent=y;s.appendChild(o);} })();
function caseSearch(){ const y=caseYear.value, no=caseNoIn.value.trim(); const p=new URLSearchParams();
  if(y)p.set("year",y); if(no)p.set("keyword",no); location.href="/static/auctions.html"+(p.toString()?"?"+p.toString():""); }
document.querySelectorAll('.nav a[data-b]').forEach(a=>{ if(a.dataset.b===B) a.classList.add("on"); });

async function loadHeader(){
  try{ const me=await fetch("/auth/me"); if(me.ok){ const u=await me.json();
    document.getElementById("util").innerHTML=
      `<span style="color:var(--primary);font-weight:600">${esc(u.name||u.email)}님</span>`+
      `<a href="#" onclick="logout();return false;">로그아웃</a>`+
      `<a href="/static/mypage.html">마이페이지</a>`+
      `<a href="/static/payment.html" class="pay">요금결제</a>`+
      (u.role==="admin"?`<a href="/static/admin.html" style="color:#fff;background:#e23b3b;padding:2px 9px;border-radius:6px;font-weight:700;text-decoration:none">🔧 관리자</a>`:``);
  } }catch(e){}
}
function logout(){ fetch("/auth/logout",{method:"POST"}).then(()=>location.reload()); }

async function render(){
  await loadHeader();
  if(MODE==="view") return renderView();
  if(MODE==="write") return renderWrite();
  return renderList();
}

function lockHtml(reason,loggedIn){
  return `<div class="card"><div class="lock"><div class="ic">🔒</div>
    <div style="margin-top:10px">${esc(reason||"이용 권한이 없습니다.")}</div>
    ${loggedIn?`<a class="btn b" href="/static/payment.html">이용권 결제하기</a>`
              :`<a class="btn b" href="/static/login.html?next=/static/board.html?b=${B}">로그인하러 가기</a>`}
  </div></div>`;
}
async function renderList(){
  const d=await (await fetch(`/board/${B}?page=${PAGE}`)).json();
  if(d.detail){ document.getElementById("view").innerHTML=`<div class="card"><div class="btbl"><div class="empty">${esc(d.detail)}</div></div></div>`; return; }
  META=d; setHead(d.title,d.desc);
  if(d.locked){ document.getElementById("view").innerHTML=lockHtml(d.reason, !!d.uid); return; }
  const rows=d.items||[], tot=d.total||0, base=tot-(d.page-1)*d.size;
  const today=new Date().toISOString().slice(0,10);
  const body = rows.length ? rows.map((r,i)=>`
      <tr>
        <td>${base-i}</td>
        <td class="tt"><a href="/static/board.html?b=${B}&id=${r.id}">${esc(r.title)}${r.created_at&&r.created_at.slice(0,10)===today?'<span class="new">N</span>':''}</a></td>
        <td class="hideM">${esc(r.author_name||"-")}</td>
        <td class="hideM">${fmtDate(r.created_at)}</td>
        <td>${r.views||0}</td>
      </tr>`).join("")
    : `<tr><td colspan="5" class="empty">등록된 게시글이 없습니다.</td></tr>`;
  const pages=Math.max(1,Math.ceil(tot/d.size));
  let pager="";
  if(pages>1){ pager='<div class="pager">';
    pager+=`<button ${d.page<=1?'disabled':''} onclick="go({page:${d.page-1}})">‹</button>`;
    for(let p=1;p<=pages;p++) pager+=`<button class="${p===d.page?'on':''}" onclick="go({page:${p}})">${p}</button>`;
    pager+=`<button ${d.page>=pages?'disabled':''} onclick="go({page:${d.page+1}})">›</button></div>`;
  }
  document.getElementById("view").innerHTML=`
    <div class="card"><table class="btbl">
      <thead><tr><th style="width:70px">번호</th><th>제목</th><th class="hideM" style="width:120px">작성자</th><th class="hideM" style="width:110px">작성일</th><th style="width:70px">조회</th></tr></thead>
      <tbody>${body}</tbody></table></div>
    <div class="toolbar">
      <span class="tot">총 <b>${tot}</b>건</span>
      ${d.can_write?`<a class="btn b" href="/static/board.html?b=${B}&write=1">✏ 글쓰기</a>`:`<span></span>`}
    </div>${pager}`;
}

let VIEW_UID=null;
async function renderView(){
  const id=P.get("id");
  const meta=await (await fetch(`/board/${B}?page=1`)).json();   // 메타+로그인 상태
  META=meta; setHead(meta.title,meta.desc); VIEW_UID=meta.uid;
  const res=await fetch(`/board/${B}/post/${id}`);
  const r=await res.json();
  if(res.status===403){ document.getElementById("view").innerHTML=lockHtml(r.detail, !!meta.uid); return; }
  if(r.detail){ document.getElementById("view").innerHTML=`<div class="card"><div class="vbody">${esc(r.detail)}</div></div>`; return; }
  document.getElementById("view").innerHTML=`
    <div class="card">
      <div class="vhead">
        <div class="vt">${esc(r.title)}</div>
        <div class="vm"><span>작성자 ${esc(r.author_name||"-")}</span><span>${fmtDate(r.created_at)}</span><span>조회 ${r.views||0}</span></div>
      </div>
      <div class="vbody">${r.content||'<span style="color:var(--muted)">내용이 없습니다.</span>'}</div>
      <div class="vfoot">
        <a class="btn g" href="/static/board.html?b=${B}">목록</a>
        ${r.can_edit?`<button class="btn r" onclick="del(${id})">삭제</button>`:`<span></span>`}
      </div>
    </div>
    ${r.comment_off?"":commentsHtml(id, r.comments||[], r.can_comment)}`;
}
function commentsHtml(pid, list, canComment){
  const items = list.length ? list.map(c=>{
    const mine = (VIEW_UID && c.author_id===VIEW_UID);
    return `<li>
      <div class="cmeta"><span class="nm">${esc(c.author_name||"회원")}</span><span>${fmtDate(c.created_at)}</span>
        ${mine||META.is_admin?`<button class="cdel" onclick="delComment(${pid},${c.id})">삭제</button>`:""}</div>
      <div class="ctext">${esc(c.content)}</div></li>`;
  }).join("") : `<li class="cempty">첫 댓글을 남겨보세요.</li>`;
  const writer = canComment
    ? `<div class="cwrite"><textarea id="cInput" placeholder="댓글을 입력하세요" maxlength="1000"></textarea><button onclick="addComment(${pid})">등록</button></div>`
    : `<div class="cguide">댓글 작성은 <a href="/static/login.html?next=/static/board.html?b=${B}%26id=${pid}">로그인</a> 후 가능합니다.</div>`;
  return `<div class="cmts"><div class="ch">댓글 <b>${list.length}</b></div><ul class="clist">${items}</ul>${writer}</div>`;
}
async function addComment(pid){
  const t=document.getElementById("cInput"); const content=(t.value||"").trim();
  if(!content){ alert("댓글을 입력하세요."); return; }
  const r=await fetch(`/board/${B}/post/${pid}/comments`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content})});
  if(r.status===401){ location.href=`/static/login.html?next=/static/board.html?b=${B}%26id=${pid}`; return; }
  const d=await r.json();
  if(d.ok){ renderView(); } else alert(d.detail||"댓글 등록 실패");
}
async function delComment(pid,cid){
  if(!confirm("댓글을 삭제할까요?")) return;
  const r=await fetch(`/board/${B}/post/${pid}/comments/${cid}`,{method:"DELETE"});
  const d=await r.json();
  if(d.ok){ renderView(); } else alert(d.detail||"삭제 실패");
}

async function del(id){
  if(!confirm("이 게시글을 삭제할까요?")) return;
  const r=await fetch(`/board/${B}/post/${id}`,{method:"DELETE"});
  const d=await r.json();
  if(d.ok){ alert("삭제되었습니다."); go({}); }
  else alert(d.detail||"삭제 실패");
}

async function renderWrite(){
  const d=await (await fetch(`/board/${B}?page=1`)).json();
  META=d; setHead(d.title,d.desc);
  if(!d.uid){ document.getElementById("view").innerHTML=
    `<div class="card"><div class="loginbox">글쓰기는 로그인이 필요합니다.<br><br><a href="/static/login.html?next=/static/board.html?b=${B}%26write=1">로그인하러 가기 ›</a></div></div>`; return; }
  if(!d.can_write){
    const who = d.write==='grade' ? '등급 회원' : (d.write==='admin' ? '관리자' : '로그인 회원');
    document.getElementById("view").innerHTML=
    `<div class="card"><div class="loginbox">이 게시판은 <b>${who}</b>만 글을 등록할 수 있습니다.<br><br><a class="btn g" href="/static/board.html?b=${B}">목록으로</a></div></div>`; return; }
  document.getElementById("view").innerHTML=`
    <div class="card edcard"><div class="form">
      <div class="frow"><label>제목</label><input id="f_title" maxlength="200" placeholder="제목을 입력하세요"></div>
      <div class="frow"><label>내용</label><textarea id="f_content" placeholder="내용을 입력하세요"></textarea></div>
      <div class="fbtns">
        <a class="btn g" href="/static/board.html?b=${B}">취소</a>
        <button class="btn b" onclick="submitPost()">등록</button>
      </div>
    </div></div>`;
  initEditor();
}
let SE=null;
function initEditor(){
  if(!window.SUNEDITOR){ return; }   // CDN 로드 실패 시 기본 textarea로 폴백
  SE=SUNEDITOR.create('f_content', {
    lang: (window.SUNEDITOR_LANG && SUNEDITOR_LANG.ko) || undefined,
    height: 340, minHeight: 260,
    stickyToolbar: -1,            // 툴바 고정 끔(드롭다운이 위로 뒤집혀 잘리는 현상 방지)
    imageUploadUrl: '/board/upload',
    imageUploadSizeLimit: 8*1024*1024,
    imageAccept: '.jpg,.jpeg,.png,.gif,.webp,.bmp',
    defaultStyle: 'font-size:14px; line-height:1.7;',
    buttonList: [
      ['undo','redo'],
      ['font','fontSize','formatBlock'],
      ['fontColor','hiliteColor'],
      ['bold','underline','italic','strike','subscript','superscript','removeFormat'],
      ['align','list','lineHeight'],
      ['outdent','indent'],
      ['table','link','image'],
      ['horizontalRule'],
      ['showBlocks','codeView','preview','fullScreen']
    ]
  });
}
async function submitPost(){
  const title=document.getElementById("f_title").value.trim();
  const content=SE ? SE.getContents(true) : document.getElementById("f_content").value;
  if(!title){ alert("제목을 입력하세요."); return; }
  const r=await fetch(`/board/${B}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title,content})});
  if(r.status===401){ location.href=`/static/login.html?next=/static/board.html?b=${B}`; return; }
  const d=await r.json();
  if(d.ok){ go({id:d.id}); }
  else alert(d.detail||"등록 실패");
}

function setHead(title,desc){
  document.getElementById("bTitle").childNodes[0].nodeValue=(title||"게시판")+" ";
  document.getElementById("bDesc").textContent=desc||"";
  document.getElementById("bCrumb").textContent=title||"게시판";
  document.title=(title||"게시판")+" — JH옥션스쿨";
}
render();
</script>
<style>
#aibot-btn{position:fixed;right:22px;bottom:22px;width:60px;height:60px;border-radius:50%;background:#1a73e8;color:#fff;border:none;font-size:22px;font-weight:800;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 20px -4px rgba(26,115,232,.6);z-index:9998;display:flex;align-items:center;justify-content:center;transition:transform .15s;animation:aibotTilt 4.5s ease-in-out infinite,aibotGlow 2.2s ease-in-out infinite;transform-origin:center bottom;}
@keyframes aibotTilt{0%,84%,100%{transform:rotate(0)}88%{transform:rotate(-13deg)}92%{transform:rotate(13deg)}96%{transform:rotate(-6deg)}}
@keyframes aibotJump{0%,100%{transform:translateY(0)}45%{transform:translateY(-16px)}}
@keyframes aibotGlow{0%,100%{box-shadow:0 4px 13px -2px rgba(26,115,232,.5),0 0 10px 1px rgba(26,115,232,.35)}50%{box-shadow:0 4px 17px -2px rgba(26,115,232,.62),0 0 23px 5px rgba(26,115,232,.62)}}
#aibot-btn:hover{animation:aibotJump .55s ease,aibotGlow 2.2s ease-in-out infinite;}
#aibot-panel{position:fixed;right:22px;bottom:92px;width:360px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 130px);background:#fff;border-radius:16px;box-shadow:0 16px 50px -12px rgba(0,0,0,.4);z-index:9998;display:none;flex-direction:column;overflow:hidden;border:1px solid #e3e8ef;}
#aibot-panel.on{display:flex;}
.aibot-head{background:#1f4fa3;color:#fff;padding:14px 16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.aibot-head button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;}
#aibot-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f6f8fb;}
.aibot-msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;}
.aibot-msg.u{align-self:flex-end;background:#1f4fa3;color:#fff;border-bottom-right-radius:4px;}
.aibot-msg.a{align-self:flex-start;background:#fff;color:#1c1c1a;border:1px solid #e3e8ef;border-bottom-left-radius:4px;}
.aibot-input{display:flex;gap:8px;padding:12px;border-top:1px solid #eef1f5;background:#fff;}
.aibot-input input{flex:1;height:40px;border:1px solid #d5dce6;border-radius:10px;padding:0 12px;font-size:14px;outline:none;}
.aibot-input input:focus{border-color:#1f4fa3;}
.aibot-input button{height:40px;padding:0 16px;background:#1f4fa3;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.aibot-cards{display:flex;flex-direction:column;gap:10px;align-self:flex-start;width:100%;max-width:290px;}
.aibot-card{display:block;background:#fff;border:1px solid #e3e8ef;border-radius:12px;overflow:hidden;text-decoration:none;color:#1c1c1a;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.aibot-card:hover{border-color:#1a73e8;box-shadow:0 4px 14px rgba(26,115,232,.22);}
.aibot-card-img{position:relative;width:100%;height:150px;background:#eef2f8;}
.aibot-card-img img{width:100%;height:150px;object-fit:cover;display:block;}
.aibot-card-noimg{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:42px;}
.aibot-card-badge{position:absolute;top:8px;right:8px;background:#e8202a;color:#fff;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.aibot-card-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;}
.aibot-card-body{padding:10px 12px 11px;}
.aibot-card-case{font-size:13px;font-weight:800;color:#1f4fa3;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.aibot-card-addr{font-size:12px;color:#444;margin:3px 0 6px;line-height:1.45;}
.aibot-card-prices{font-size:13px;color:#1c1c1a;font-weight:700;}
.aibot-card-prices .k{color:#6b6a64;font-weight:400;font-size:11px;margin-right:1px;}
.aibot-card-grade{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.aibot-card-grade.g-ok{background:#e7f6ec;color:#1f7a3d;}.aibot-card-grade.g-mid{background:#fff4e0;color:#9a6b0b;}.aibot-card-grade.g-no{background:#fdeaea;color:#c0392b;}
</style>
<button id="aibot-btn" onclick="aibotToggle()" title="AI 도우미">AI</button>
<div id="aibot-panel">
  <div class="aibot-head"><span>🤖 JH옥션스쿨 AI 도우미</span><button onclick="aibotToggle()">✕</button></div>
  <div id="aibot-msgs"></div>
  <div class="aibot-input"><input id="aibot-in" placeholder="경매·사이트 이용, 무엇이든 물어보세요" onkeydown="if(event.key===String.fromCharCode(69,110,116,101,114))aibotSend()"><button onclick="aibotSend()">전송</button></div>
</div>
<script>
var aibotHist=[], aibotBusy=false, aibotSeen=[], aibotCtx={}, aibotLast=[];
function aibotWon(n){n=Math.round(+n||0);if(!n)return"";var e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4);var s="";if(e)s+=e+"억";if(m)s+=(e?" ":"")+m.toLocaleString()+"만";return s||n.toLocaleString();}
function aibotCards(cards){
  var box=document.getElementById("aibot-msgs");
  var wrap=document.createElement("div"); wrap.className="aibot-cards";
  wrap.innerHTML=cards.map(function(c){
    var pf=c["예상차익"]; var badge=(pf&&pf>0)?('<span class="aibot-card-badge">+'+aibotWon(pf)+' 차익</span>'):"";
    var gr=c["매수판정"]; var gcls=gr==="매수양호"?"g-ok":(gr==="매수금지"?"g-no":"g-mid");
    var grade=gr?('<span class="aibot-card-grade '+gcls+'">'+gr+'</span>'):"";
    var th=c["thumb"]; var img=th?('<img src="'+th+'" onerror="this.parentNode.innerHTML=&#39;<div class=aibot-card-noimg>&#127968;</div>&#39;">'):'<div class="aibot-card-noimg">&#127968;</div>';
    var tag=c["유형"]?('<span class="aibot-card-tag">'+c["유형"]+'</span>'):"";
    var appr=c["감정가"]?('<span class="k">감정</span>'+aibotWon(c["감정가"])):"";
    var low=c["최저가"]?('<span class="k">최저</span>'+aibotWon(c["최저가"])):"";
    var est=c["시세"]?('<span class="k">시세</span>'+aibotWon(c["시세"])):"";
    return '<a class="aibot-card" href="'+(c["링크"]||"#")+'" target="_blank">'
      +'<div class="aibot-card-img">'+img+badge+tag+'</div>'
      +'<div class="aibot-card-body">'
      +'<div class="aibot-card-case">'+(c["사건번호"]||"물건")+grade+'</div>'
      +'<div class="aibot-card-addr">'+(c["소재지"]||"")+'</div>'
      +'<div class="aibot-card-prices">'+appr+(appr&&low?' · ':'')+low+((appr||low)&&est?' · ':'')+est+'</div>'
      +'</div></a>';
  }).join("");
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}
function aibotToggle(){
  var p=document.getElementById("aibot-panel");
  p.classList.toggle("on");
  if(p.classList.contains("on") && !aibotHist.length) aibotPush("a","안녕하세요! JH옥션스쿨 AI 도우미입니다. 권리분석·예상낙찰가·회원등급 등 궁금한 점을 물어보세요.");
  if(p.classList.contains("on")) document.getElementById("aibot-in").focus();
}
function aibotPush(role,text){
  var box=document.getElementById("aibot-msgs");
  var d=document.createElement("div");
  d.className="aibot-msg "+(role==="u"?"u":"a");
  d.textContent=text; box.appendChild(d); box.scrollTop=box.scrollHeight;
  return d;
}
async function aibotSend(){
  if(aibotBusy) return;
  var inp=document.getElementById("aibot-in");
  var msg=(inp.value||"").trim(); if(!msg) return;
  inp.value=""; aibotPush("u",msg); aibotHist.push({role:"user",content:msg});
  aibotBusy=true; var typing=aibotPush("a","…");
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},cache:"no-store",
      body:JSON.stringify({message:msg,history:aibotHist.slice(-20),seen:aibotSeen.slice(-40),ctx:aibotCtx,last:aibotLast})});
    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
</script>
