<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경매물건 상세 — JH옥션스쿨</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#dfe3ea;--label:#eef2fb;--text:#1c1c1a;--muted:#6b6a64;
        --primary:#1f4fa3;--primary-bg:#eaf1fb;--danger:#c0392b;--safe:#2f7d4f;--warn:#9a6b0b;
        --hotblue:#1565ff;--hotred:#e8202a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  .bar{background:var(--card);border-bottom:2px solid var(--primary);}
  .barin{max-width:1180px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
  .brand{font-size:20px;font-weight:700;color:var(--primary);text-decoration:none;}
  .brand span{color:#3a7bd5;}
  .barin a{color:var(--muted);text-decoration:none;margin-left:12px;}
  .wrap{max-width:1180px;margin:16px auto;padding:0 16px 60px;}
  .back{font-size:13px;color:var(--primary);text-decoration:none;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:14px;}
  .mbcard{border:1px solid #cfe0ff;background:linear-gradient(180deg,#f6f9ff,#fff);}
  .mbcard h2{display:flex;align-items:center;gap:8px;}
  .mb-tag{font-size:11px;font-weight:700;color:#1f4fa3;background:#e5eeff;border:1px solid #c6d9fb;border-radius:999px;padding:2px 8px;}
  .mb-sub{color:var(--muted);font-size:13px;margin:6px 0 12px;}
  .mb-sub b{color:var(--text);}
  .mb-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .mb-row input{flex:1;min-width:150px;height:42px;border:1.5px solid #c6d9fb;border-radius:9px;padding:0 12px;font-size:17px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:#1f4fa3;background:#fff;}
  .mb-row input:focus{outline:none;border-color:#1f4fa3;box-shadow:0 0 0 3px rgba(31,79,163,.12);}
  .mb-unit{font-size:14px;color:var(--muted);font-weight:600;}
  .mb-btn{height:42px;padding:0 18px;border:none;border-radius:9px;background:#1f4fa3;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .mb-btn:hover{background:#173e82;}
  .mb-hint{margin-top:10px;font-size:12.5px;color:var(--muted);}
  .mb-hint b{color:#1f4fa3;}.mb-hint a{color:#1f4fa3;font-weight:600;text-decoration:underline;}
  .mb-blocked{border-color:#f0d9a8;background:#fff9ee;}
  .mb-msg{color:#9a6b0b;font-size:14px;line-height:1.7;padding:8px 0 2px;}
  .mb-msg b{color:#c0392b;}
  h1{font-size:18px;font-weight:600;margin:6px 0 2px;}
  .sub{font-size:13px;color:var(--muted);}
  .nodetail{font-size:13px;color:#9a6b0b;background:#fff7e6;border:1px solid #f0d9a0;border-radius:8px;padding:10px 12px;margin-bottom:10px;line-height:1.5;}
  .badge{font-size:12px;padding:2px 9px;border-radius:8px;font-weight:600;}
  .b-info{background:var(--primary-bg);color:var(--primary);}
  .b-warn{background:#fbf0d9;color:var(--warn);}
  .b-safe{background:#e9f4ee;color:var(--safe);}
  h2{font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .photos .ph{position:relative;cursor:zoom-in;}
  .photos .ph img{width:100%;height:132px;object-fit:cover;border-radius:8px;background:var(--label);display:block;}
  .photos .ph .more{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.5);color:#fff;font-size:20px;font-weight:700;border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{color:var(--muted);font-weight:500;width:110px;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}
  .docs a{display:inline-block;margin:4px 8px 4px 0;padding:7px 12px;border:1px solid var(--line);border-radius:8px;color:var(--primary);text-decoration:none;font-size:12px;}
  .docs a:hover{border-color:var(--primary);}
  .big{font-size:22px;font-weight:700;color:var(--danger);}
  .kgrid{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);}
  .kgrid th,.kgrid td{border:1px solid var(--line);padding:11px 12px;vertical-align:middle;}
  .kgrid th{background:var(--label);color:#2c5db0;font-weight:600;width:96px;
    white-space:nowrap;text-align:center;}
  .kgrid td{color:var(--text);text-align:left;font-weight:500;}
  .kgrid td.amt{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .kgrid td.low{color:var(--hotred);}
  /* 풀그리드 표(기일현황 등): 가로세로줄 전부 + 가운데 */
  .gridtbl{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);}
  .gridtbl th,.gridtbl td{border:1px solid var(--line);padding:11px 8px;text-align:center;
    color:var(--text);font-weight:500;vertical-align:middle;white-space:nowrap;}
  .gridtbl thead th{background:var(--label);color:#2c5db0;font-weight:600;}
  .gridtbl td.num{font-variant-numeric:tabular-nums;}
  /* 매각(낙찰) 회차 아래 서브행: 낙찰가·가율·입찰자수·2등·낙찰자 */
  .gridtbl tr.saleSub td{background:#f1faf4;color:#15803d;font-weight:600;text-align:left;
    white-space:normal;padding:7px 12px;font-size:12.5px;}
  .gridtbl tr.saleSub b{color:#dc2626;}
  .gridtbl tr.saleSub .sgap{color:#9aa3ad;margin:0 6px;}
  .gridtbl tr.saleSub .s2nd{display:inline-block;margin-top:3px;color:#3f8a5e;}
  @media(max-width:640px){ .kgrid th{width:78px;} }
  .row2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;align-items:start;margin-top:14px;}
  .row2 .card,.row2 .svcard{margin-top:0;}
  /* 4컬럼(물건현황·면적·임차인·등기) */
  .cols4{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:12px;align-items:start;margin-top:14px;}
  .cols4 .svcard{margin-top:0;}
  .sv-blk{padding:9px 13px;border-bottom:1px solid var(--line);}
  .sv-blk .sv-type{margin-bottom:3px;}
  .docbtn{display:block;margin:10px 13px;padding:9px;text-align:center;background:var(--primary);
    color:#fff;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;}
  .docbtn:hover{filter:brightness(1.08);}
  /* 권리분석/임차인: 스피드옥션식 세로 블록 카드 */
  .svcard{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .svcard .sv-hd{background:var(--label);color:var(--text);font-weight:700;font-size:14px;
    padding:10px 13px;border-bottom:1px solid var(--line);}
  .sv-subhd{background:#f5f7fb;color:var(--primary);font-weight:700;font-size:12.5px;
    padding:7px 13px;border-bottom:1px solid var(--line);border-top:1px solid var(--line);}
  .sv-row{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:8px 13px;border-bottom:1px solid var(--line);font-size:13px;}
  .sv-row .lbl{color:var(--text);font-weight:600;}
  .sv-row .dt{color:var(--muted);}
  .sv-item{display:flex;justify-content:space-between;gap:10px;
    padding:10px 13px;border-bottom:1px solid var(--line);}
  .sv-item.base{background:#eaf2fb;}                 /* 소멸기준 강조(연파랑) */
  .sv-item.opp{background:#fdecea;}                  /* 대항력 임차인 강조 */
  .sv-l{min-width:0;}
  .sv-type{font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;}
  .sv-line{font-size:12.5px;color:var(--muted);line-height:1.65;word-break:keep-all;overflow-wrap:anywhere;
    padding-left:0.85em;text-indent:-0.85em;}   /* 한글 단어 보존 + '·' 행잉 인덴트(줄바꿈 시 본문 정렬) */
  .sv-r{text-align:right;white-space:nowrap;flex-shrink:0;}
  .sv-status{font-weight:800;font-size:13px;}
  .sv-status.base{color:var(--hotred);}             /* 소멸기준 */
  .sv-status.gone{color:var(--muted);}              /* 소멸 */
  .sv-status.keep{color:var(--hotred);}             /* 인수/대항력있음 */
  .sv-status.own{color:var(--hotblue);}             /* 이전(소유권) */
  .sv-gun{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400;}
  .sv-total{display:flex;justify-content:space-between;padding:11px 13px;
    font-weight:700;font-size:13px;background:#fafbfc;}
  .sv-total b{color:var(--hotred);font-size:15px;}
  .sv-note{font-size:11px;color:var(--muted);padding:9px 13px;line-height:1.6;}
  .sv-note.warn{color:var(--hotred);}
  .sv-cmt{font-size:11.5px;color:var(--hotred);line-height:1.5;margin-top:4px;
          word-break:keep-all;font-weight:600;}
  .svflag{font-size:11.5px;font-weight:700;color:var(--hotred);margin-top:3px;white-space:nowrap;}
  .svflag.wv{color:var(--muted);font-weight:600;text-decoration:line-through;}   /* 확약서로 인수 면제 → 판정 무효 표시 */
  /* 주변 유사 실거래 지도 */
  .mapsub{font-size:12px;font-weight:500;color:var(--muted);margin-left:6px;}
  /* 엔카 동일 중고차 매물 */
  .esum{font-size:13px;color:var(--text);margin:2px 0 12px;}
  .esum .eavg{color:var(--hotred);}
  .elist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .ecard{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;color:inherit;}
  .ecard:hover{border-color:#9fb6e0;box-shadow:0 1px 6px rgba(0,0,0,.08);}
  .ethumb{width:100%;height:130px;background:#eef1f5;display:flex;align-items:center;justify-content:center;}
  .ethumb img{width:100%;height:100%;object-fit:cover;}
  .ethumb.noimg::after{content:"사진없음";color:var(--muted);font-size:12px;}
  .einfo{padding:9px 11px 4px;}
  .ename{font-weight:700;font-size:13px;line-height:1.3;}
  .ebadge{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;}
  .emeta{font-size:11.5px;color:var(--primary);margin-top:5px;font-weight:600;}
  .eins{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
  .eins div{padding:1px 0;}
  .eprice{margin-top:auto;padding:8px 11px;font-weight:800;color:var(--hotred);font-size:14px;border-top:1px solid var(--line);background:#fffafa;}
  /* 실거래 지도 핀 — 유사거래=파란핀, 경매물건=빨간핀(사진 스타일: 큰 물방울+흰 점) */
  .mflag{width:24px;height:24px;background:#1a73e8;border:2px solid #fff;
         border-radius:50% 50% 50% 0;box-shadow:0 2px 5px rgba(0,0,0,.4);
         transform:rotate(-45deg) translate(5px,-5px);cursor:pointer;position:relative;}
  .mflag::after{content:"";position:absolute;top:50%;left:50%;width:8px;height:8px;
         background:#fff;border-radius:50%;transform:translate(-50%,-50%);}
  .mflag:hover{background:#1257c4;}
  .mflag.subject{width:30px;height:30px;background:#e23b2e;border-width:2.5px;z-index:10;
         transform:rotate(-45deg) translate(7px,-7px);}
  .mflag.subject::after{width:10px;height:10px;}
  .mflag.subject:hover{background:#c62828;}
  /* 유사거래 핀: 좌표 '중심'에 앉는 점 — 바닥앵커 물방울이 원 경계 위로 솟아 500m 밖처럼 보이던 문제 해결 */
  .mdot{width:14px;height:14px;background:#1a73e8;border:2px solid #fff;border-radius:50%;
         box-shadow:0 1px 3px rgba(0,0,0,.45);cursor:pointer;}
  .mdot:hover{background:#1257c4;width:16px;height:16px;}
  /* 깃발 클릭 정보창 */
  .mpop{position:relative;background:#fff;border:1px solid var(--line);border-radius:9px;
        box-shadow:0 3px 12px rgba(0,0,0,.25);padding:9px 26px 9px 12px;min-width:140px;white-space:nowrap;}
  .mpop::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
        border:7px solid transparent;border-top-color:#fff;}
  .mpop-x{position:absolute;top:4px;right:5px;border:none;background:none;font-size:16px;
        line-height:1;color:var(--muted);cursor:pointer;padding:2px 4px;}
  .mpop-x:hover{color:var(--hotred);}
  .mpop-nm{font-weight:700;font-size:13px;color:var(--text);}
  .mpop-ad{font-size:11px;color:var(--muted);margin-top:1px;}
  .mpop-rw{font-size:12px;color:var(--text);margin-top:4px;}
  .mpop-amt{font-size:14px;font-weight:800;color:var(--hotred);margin-top:2px;}
  .elevseg{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
  .elevseg-lb{font-size:13px;font-weight:700;color:var(--primary);margin-right:2px;}
  .eseg{font-size:13px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 14px;cursor:pointer;transition:.12s;}
  .eseg:hover{border-color:#9fb6e0;}
  .eseg.on{background:var(--primary);border-color:var(--primary);color:#fff;}
  .grpseg{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .grpseg-lb{font-size:13px;font-weight:700;color:var(--primary);margin-right:2px;}
  .gchip{font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 12px;cursor:pointer;transition:.12s;white-space:nowrap;}
  .gchip:hover{border-color:#9fb6e0;}
  .gchip.on{background:#1565ff;border-color:#1565ff;color:#fff;}
  .nb-band{font-weight:800;color:var(--primary);font-size:13px;margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--label);}
  .nb-band .nb-cnt{font-size:11.5px;font-weight:600;color:var(--muted);margin-left:6px;}
  .nb-scroll{max-height:240px;overflow:auto;}
  .nb-tbl{width:100%;border-collapse:collapse;}
  .nb-tbl th{background:#f7f9fc;color:var(--primary);font-weight:700;font-size:11.5px;padding:6px 5px;border:1px solid var(--line);white-space:nowrap;position:sticky;top:0;}
  .nb-tbl td{padding:6px 7px;border:1px solid var(--line);font-size:12px;text-align:center;}
  .nb-tbl td.amt{font-weight:800;color:var(--hotred);white-space:nowrap;}
  .nb-tbl td.bd{text-align:left;}
  .nb-tbl td.bd b{font-weight:700;}
  .nb-tbl td.bd .adr{display:block;color:var(--muted);font-size:10.5px;margin-top:2px;}
  .nb-tbl td.adr2{text-align:left;color:var(--muted);font-size:11px;white-space:nowrap;}
  .nb-tbl td.gp{color:var(--muted);white-space:nowrap;}
  .nb-tbl td.yul{color:#7a3fd0;font-weight:700;}
  /* 실거래가 상세 헤더 */
  .nb-head{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px;gap:8px;flex-wrap:wrap;}
  .nb-title{font-size:15px;font-weight:800;color:var(--text);}
  .nb-apibadge{font-size:10.5px;font-weight:700;color:var(--primary);background:#eef3fc;border:1px solid #d4e0f5;border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
  .nb-headr{display:flex;align-items:center;gap:10px;}
  .nb-total{font-size:12.5px;color:var(--muted);font-weight:700;}
  .nb-xls{font-size:12px;font-weight:700;color:#1a7f4b;background:#eafaf1;border:1px solid #b6e6cb;border-radius:8px;padding:6px 12px;cursor:pointer;}
  .nb-xls:hover{background:#d8f3e3;}
  .nb-subt{font-size:12px;color:var(--muted);margin:2px 0 12px;line-height:1.55;}
  .nb-subt .nb-hl{color:var(--primary);font-weight:700;}
  .nb-subt .nb-hl2{color:#1a7f4b;font-weight:700;}
  .nb-subt .nb-hl3{color:#7a3fd0;font-weight:700;}
  .nb-subt .nb-prop{display:block;margin-top:5px;}
  /* 아코디언 */
  .acc{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;}
  .acc-h{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;background:#fafbfd;cursor:pointer;user-select:none;}
  .acc-h:hover{background:#f3f6fb;}
  .acc.open .acc-h{background:#eef3fc;}
  .acc-hl{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .acc-name{font-weight:800;font-size:13px;color:var(--text);}
  .acc-cnt{font-size:11.5px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 8px;}
  .acc-badge{font-size:10.5px;font-weight:800;color:#fff;border-radius:6px;padding:3px 9px;}
  .acc-badge.red{background:#e8202a;}
  .acc-badge.blue{background:#1f6fe0;}
  .acc-badge.gray{background:#8a93a3;}
  .acc-map{font-size:10.5px;font-weight:700;color:#1565ff;background:#eef4ff;border:1px solid #c7dbff;border-radius:6px;padding:2px 8px;cursor:pointer;line-height:1.4;}
  .acc-map:hover{background:#dfeaff;}
  .acc-map.on{background:#1565ff;color:#fff;border-color:#1565ff;}
  .acc-hr{display:flex;align-items:center;gap:12px;white-space:nowrap;}
  .acc-avg{font-size:12px;color:var(--primary);font-weight:700;}
  .acc-avg .acc-yul{color:var(--muted);font-weight:600;}
  .acc-chev{font-size:12px;color:var(--muted);transition:transform .15s;}
  .acc.open .acc-chev{transform:rotate(180deg);}
  .acc-b{display:none;border-top:1px solid var(--line);}
  .acc.open .acc-b{display:block;}
  /* 차량/중기현황 표 */
  .foldbtn{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted,#667);background:var(--label,#eef2f7);border:1px solid var(--line,#dde3ea);border-radius:7px;padding:3px 11px;cursor:pointer;}
  .foldbtn:hover{background:var(--line,#dde3ea);}
  .foldbtn.sm{margin-left:8px;padding:1px 8px;font-size:11px;}
  .rhead{display:flex;gap:14px;align-items:flex-start;margin-top:4px;}
  .rpic{width:160px;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--line);flex:none;}
  .rhinfo{flex:1;min-width:0;}
  .rrate{font-size:13px;color:var(--muted);margin-bottom:4px;}.rrate b{font-size:22px;color:var(--primary);}.rrate span{font-size:13px;color:var(--muted);}
  .rtitle{font-size:16px;font-weight:700;color:var(--text);}
  .rone{color:var(--muted);margin-top:2px;}
  .rprice{margin-top:6px;font-size:13px;color:var(--text);}.rprice b{color:#1a7f4b;}
  .rcats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}
  .rcat{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--label,#f7f9fc);}
  .rcatk{font-weight:700;font-size:12.5px;color:var(--labeltx,#2c5db0);}
  .rcatv{float:right;font-weight:700;color:var(--primary);}
  .rcatt{font-size:12px;font-weight:600;margin-top:3px;color:var(--text);}
  .rcats .rcats{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.5;}
  .rsyn{margin-top:12px;padding:10px 12px;border-left:3px solid var(--primary);background:var(--label,#f7f9fc);border-radius:0 8px 8px 0;font-size:12.5px;line-height:1.7;color:var(--text);}
  .rsynt{font-weight:700;margin-bottom:4px;}
  .rsec{margin-top:14px;}
  .rsech{font-weight:700;font-size:13px;display:flex;align-items:center;}
  .rcmt{border-top:1px solid var(--line);padding:8px 2px;font-size:12.5px;line-height:1.6;}

<script>
const itemKey=new URLSearchParams(location.search).get("item_key");
let DETAIL=null;          // load()에서 받은 상세(배당종기일 등 공유용)
let PHOTOS=[], lbIdx=0;   // 전체 사진 슬라이드용
let APT_COMPLEX="";       // apt_info에서 받은 정확한 단지명(네이버/KB 링크 정밀화용)
// ── 네이버/KB 부동산 단지 검색 링크 ──
let KB_XY="";   // /geocode 로 받은 "lat,lng" (KB 지도 중심이동용)
function naverUrl(q){ return "https://m.land.naver.com/search/result/"+encodeURIComponent(q||""); }
// 아파트/오피스텔은 단지명 검색이 단지를 바로 열어줌(KB 단지DB에 등록). 빌라 등은 좌표로 지도중심(단지검색 약함).
function kbUrl(q){
  const isApt=/아파트|오피스텔/.test((DETAIL&&DETAIL.usage)||"");
  if(isApt && q) return "https://kbland.kr/map?q="+encodeURIComponent(q);
  return KB_XY? ("https://kbland.kr/map?xy="+KB_XY+",17")
              : ("https://kbland.kr/map?q="+encodeURIComponent(q||"")); }
// 주소의 '지번 뒤 ~ 동/층/호 앞' = 아파트 단지명 전체(실거래 축약명보다 정확)
function landNameFromAddr(){
  const a=(DETAIL&&DETAIL.address)||"";
  // 법정동(동/읍/면/리) + 지번(숫자[-숫자]) 위치
  const jm=a.match(/(?:동|읍|면|리)\s+\d+(?:-\d+)?\s+/);
  if(!jm) return "";
  let rest=a.slice(jm.index+jm[0].length);            // 지번 뒤 전체
  // 건물 동/층/호/지하 표기 앞에서 자름 → 단지명만 남김
  rest=rest.replace(/\s*(?:제?\s*\d+\s*동|[A-Za-z]?\d+\s*동|지하\s*\d*|[Bb]\d+|\d+\s*층|\d+\s*호|외\s*\d).*$/,"").trim();
  rest=rest.replace(/-/g,"").replace(/\s+/g," ").trim();    // 하이픈 제거(이-편한세상→이편한세상)
  rest=rest.replace(/이편한세상/g,"e편한세상");                 // 브랜드 정규화: 네이버 등록명은 'e편한세상'
  return rest;
}
function landQuery(){
  return landNameFromAddr() || APT_COMPLEX || ((DETAIL&&DETAIL.address)||"");
}
// ── 실거래 테이블 열별 필터(거래일 월별·전용면적·층, 다중선택) ──
let APT_TRADES=[], aptF={month:new Set(),area:new Set(),floor:new Set()};
function aptUnique(key){
  const s=new Set();
  APT_TRADES.forEach(t=>{
    if(key==='month') s.add((t.deal_date||'').slice(0,7));
    else if(key==='area') s.add(Math.round(t.area));
    else s.add(String(t.floor));
  });
  return [...s].filter(v=>v!==''&&v!=null&&v!=='null'&&v!=='-')
    .sort((a,b)=> key==='month'?(a<b?1:-1):(Number(a)-Number(b)));
}
function aptPass(t){
  if(aptF.month.size && !aptF.month.has((t.deal_date||'').slice(0,7))) return false;
  if(aptF.area.size && !aptF.area.has(Math.round(t.area))) return false;
  if(aptF.floor.size && !aptF.floor.has(String(t.floor))) return false;
  return true;
}
function renderAptRows(){
  const tb=document.getElementById('aptTbody'); if(!tb) return;
  const rows=APT_TRADES.filter(aptPass);
  tb.innerHTML=rows.length? rows.map(t=>`<tr><td>${t.deal_date}</td><td>${Math.round(t.area*100)/100}㎡</td>`
    +`<td class="amt">${won(t.amount)}</td><td>${t.floor||'-'}</td></tr>`).join('')
    : `<tr><td colspan="4" class="apt-empty">선택한 조건의 거래가 없습니다.</td></tr>`;
  document.querySelectorAll('.apt-fbtn').forEach(b=>b.classList.toggle('on', aptF[b.dataset.k] && aptF[b.dataset.k].size>0));
  aptUpdateSummary(rows);                          // 거른 행으로 요약카드(평균·최저·최고·최근) 재계산
}
function aptUpdateSummary(rows){                    // 실거래 필터 결과로 요약카드 갱신(필터 없으면 전체=서버값과 동일)
  const amts=rows.map(t=>+t.amount).filter(a=>a>0);
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=(v!=null?won(v):'-'); };
  if(!amts.length){ ['aptQrecent','aptQavg','aptQmin','aptQmax'].forEach(id=>set(id,null)); return; }
  let recent=rows[0], rd=rows[0].deal_date||'';     // 최근 = 거래일 최신 행의 금액
  rows.forEach(t=>{ const d=t.deal_date||''; if(d>rd){ rd=d; recent=t; } });
  set('aptQrecent', +recent.amount);
  set('aptQavg', Math.round(amts.reduce((a,b)=>a+b,0)/amts.length));
  set('aptQmin', Math.min(...amts));
  set('aptQmax', Math.max(...amts));
}
function closeAptPop(){ const p=document.getElementById('aptPop'); if(p) p.remove(); }
function aptOpenFilter(ev,key){

function won(n){
  if(n===null||n===undefined||n==="") return "-";
  n=Math.round(+n); if(isNaN(n)) return "-"; if(n===0) return "0원";
  const eok=Math.floor(n/1e8), man=Math.floor((n%1e8)/1e4);
  let s=""; if(eok)s+=eok+"억 "; if(man)s+=man.toLocaleString()+"만";
  if(!s)s=n.toLocaleString(); return s.trim()+"원";
}

function sellLabel(s){ // "2026-06-17 (입찰 당일)" → "(수) 2026-06-17 10:00"
  const m=String(s||"").match(/(\d{4})-(\d{2})-(\d{2})/);

}

async function loadDocSummary(){
  const box=document.getElementById("summaryBox");
  if(!box) return;
  let s={};
  try{ s=await (await fetch("/auction/docsummary?item_key="+encodeURIComponent(itemKey))).json()||{}; }
  catch(e){ s={}; }
  // 모든 유형의 물건에 박스를 항상 노출(데이터 없으면 '해당사항 없음'으로 표기)
  const esc=t=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const val=t=> t? esc(t) : '';
  const docs=(s.court_docs||[]).slice(0,3);   // 최근 3개만
  const docsHtml = docs.length
    ? `<div class="docs">${docs.map(d=>`<div class="docrow"><span class="dt">${d.date}</span> <span class="gb">${d.gubun}</span> ${esc(d.content)}</div>`).join('')}</div>`
    : '';
  const cautionHtml = s.caution? `<div class="caution">※ ${esc(s.caution)}</div>` : '';
  const noteCell = (cautionHtml||docsHtml)
    ? cautionHtml+docsHtml
    : '<span class="emptyv">-</span>';
  box.innerHTML=`
  <div class="smrycard smry">
    <div class="smry-hd">📋 명세서 요약사항
      ${s.senior_setup?`<span class="badge">최선순위 설정일자 ${esc(s.senior_setup)}</span>`:''}</div>
    <table>
      <tr><th>소멸되지 않는 등기부권리</th><td>${s.surviving_rights?val(s.surviving_rights):'<span class="emptyv">해당사항 없음</span>'}</td></tr>
      <tr><th>설정된 것으로 보는 지상권</th><td>${s.ground_rights?val(s.ground_rights):'<span class="emptyv">해당사항 없음</span>'}</td></tr>
      <tr><th>주의사항 / 법원문건접수 요약</th><td>${noteCell}</td></tr>
    </table>
  </div>`;
}

        rent=v('dgc_rent')*W, dep=v('dgc_dep')*W, taxr=(window.DG_TAXR||4.6), target=10;   // 취득세율·목표순수익 입력칸 제거 → 기본값 고정
  const loan=(document.getElementById('dgc_loan')||{}).value||'근저당';
  const appr=window.DG_APPR||0, mixed=window.DG_MIXED;
  const limit=Math.min(appr*(mixed?0.7:0.6), bid*0.8);          // 대출한도(감정60·70 / 낙80 중 낮은값)
  const bangong=loan==='신탁'?0:rooms*minju;                     // 방공제(신탁=없음)
  const yunja=Math.max(0,limit-bangong);                         // 융자(실대출)
  const tax=bid*taxr/100;
  const invest=bid+tax-yunja-dep;                               // 실투자금
  const mInt=yunja*rate/100/12;                                 // 월이자
  const net=rent-mInt;                                          // 순월세
  const yG=invest>0?net*12/invest*100:null;                    // 일반 수익률
  const yN=(bid-yunja)>0?net*12/(bid-yunja)*100:null;          // 순수익률(분모 입찰가−융자)
  const sell=target>0?yunja+net*12*100/target:null;           // 목표 순수익률 만족 매도가(역산)
  const chae=yunja*1.2;                                         // 채권최고액
  const depLimit=sell!=null?Math.max(0,sell*0.7-chae):null;    // 임차보증금 한도(매도가70%−채권)
  const pct=x=>x==null?'-':(x<0?'−':'')+Math.abs(x).toFixed(1)+'%';
  const row=(k,val,hot)=>`<div class="dg-orow"><span>${k}</span><b${hot?(' style="color:'+(typeof hot==='string'?hot:'#c0392b')+'"'):''}>${val}</b></div>`;
  out.innerHTML=row('대출한도',won(limit))+row('방공제',loan==='신탁'?'없음(신탁)':won(bangong))
    +row('융자(실대출)',won(yunja),1)+row('취득세',won(tax))
    +row('실투자금',invest<0?('플러스피 '+won(-invest)):won(invest),1)
    +row('월 이자',won(mInt))+row('순월세',won(net),'#ff0000')+row('일반 수익률',pct(yG))+row('순수익률',pct(yN))
    +row('목표수익 매도가(역산)',won(sell),1)+row('채권최고액(120%)',won(chae))
    +row('임차보증금 한도',won(depLimit));
}
function dgFmt(el){ const raw=String(el.value).replace(/[^\d]/g,''); el.value=raw.replace(/\B(?=(\d{3})+(?!\d))/g,','); }   // 천단위 콤마(단위 '만' 입력칸)
function wireDagaguCalc(){
  ['dgc_bid','dgc_minju','dgc_rent','dgc_dep'].forEach(id=>{ const e=document.getElementById(id); if(e){ dgFmt(e); e.oninput=()=>{ dgFmt(e); dgCalc(); }; } });   // 만 단위 = 콤마 포맷
  ['dgc_rate','dgc_rooms'].forEach(id=>{ const e=document.getElementById(id); if(e) e.oninput=dgCalc; });

function ssTax(income){   // 차익(원) → 종합소득세 {세율%, 누진공제(원)} (2023~ 누진세율표)
  const T=[[14000000,6,0],[50000000,15,1260000],[88000000,24,5760000],[150000000,35,15440000],
           [300000000,38,19940000],[500000000,40,25940000],[1000000000,42,35940000],[Infinity,45,65940000]];
  for(const t of T){ if(income<=t[0]) return {rate:t[1],ded:t[2]}; }
  return {rate:45,ded:65940000};
}
function _ssBidDefault(){   // 낙찰가 기본값(만): 예상낙찰가 있으면 그것, 없으면 최저가

}

    <div class="ss-vat-h">${over85?`✓ 85㎡ 초과(전용 ${exclArea}㎡) 자동감지`:'전용면적 미상(85㎡ 초과 시 해당)'} — 건물분 부가세(사업자 매매 시)</div>
    <div id="ssc_vatbox">
      <div class="ss-vatrow"><span class="ss-vatlbl">건물 기준시가</span><input id="ssc_bldg" type="text" inputmode="numeric" placeholder="자동 추정"><span class="ss-vatu">원</span><a class="ss-lookup" href="https://www.hometax.go.kr/" target="_blank" rel="noopener">홈택스 ↗</a></div>
      <div class="ss-vatrow"><span class="ss-vatlbl">개별공시지가</span><input id="ssc_gongsi" type="text" inputmode="numeric" placeholder="㎡당 자동조회"><span class="ss-vatu">원/㎡</span><a class="ss-lookup" href="https://www.eum.go.kr/" target="_blank" rel="noopener">토지이음 ↗</a></div>
      <div class="ss-vatrow"><span class="ss-vatlbl">토지면적</span><input id="ssc_area" type="number" step="0.01" value="${landArea}"><span class="ss-vatu">㎡</span></div>
      <div class="ss-vatrow"><span class="ss-vatlbl">부가세</span><select id="ssc_vatincl"><option>별도</option><option>포함</option></select></div>
    </div>`:''}
    <div class="dg-out" id="ssc_out"></div>
    <div class="dg-note">낙찰가=${auto}·매도가=추정시세·입찰보증금=상세값(전부 수정가능). 대출=감정가 60%·낙찰가 80% 중 낮은 금액 자동. 취등록세=금액·면적별 자동(6~9억은 1~3%, 농특세·교육세·말소·인지·채권 포함). 종소세는 차익 기준 종합소득세 누진세율표 자동. 85㎡ 초과는 위 체크 후 건물분 부가세(홈택스·토지이음). 세금은 대략치 — 세무 확인 필요.</div>
  </div>`;
}
function acqDetail(price, over85, malsoCnt, chaeWon){   // 취등록세 상세(취득세+농특세+교육세+말소+인지+채권)
  const eok=price/1e8;
  let base = eok<=6?1.0 : (eok<=9?(eok*2/3-3):3.0);   // 6~9억은 금액 따라 1~3% 선형 증가
  base=Math.round(base*100)/100;
  const acq=Math.round(price*base/100);               // 취득세
  const nong=over85?Math.round(price*0.2/100):0;      // 농어촌특별세(85㎡초과만 0.2%)
  const edu=Math.round(acq*0.1);                       // 지방교육세=취득세×10%
  const malso=(malsoCnt||0)*11200;                     // 말소등록세=건수×(말소7,200+인지대4,000)
  const inji=price<=1e8?0:(price<=1e9?150000:350000);  // 인지세(1억↓0·1~10억15만·10억↑35만)
  const chae=chaeWon||0;                               // 국민주택채권(직접입력)
  return {base, acq, nong, edu, malso, inji, chae, total:acq+nong+edu+malso+inji+chae,
          rateTot:Math.round((base+base*0.1+(over85?0.2:0))*100)/100};
}
function ssCalc(){
  const out=document.getElementById('ssc_out'); if(!out) return;
  const v=id=>{ const e=document.getElementById(id); return e?(+(String(e.value).replace(/,/g,''))||0):0; };
  const W=10000;
  const bid=v('ssc_bid')*W, sell=v('ssc_sell')*W, dep=v('ssc_dep')*W;
  const limAppr=v('ssc_lim_appr')||60, limBid=v('ssc_lim_bid')||80, intR=v('ssc_int'), preR=v('ssc_pre'), months=v('ssc_months');
  const law=v('ssc_law')*W, mgmt=v('ssc_mgmt')*W, evict=v('ssc_evict')*W, repair=v('ssc_repair')*W, broker=v('ssc_broker')*W, etc=v('ssc_etc')*W;
  const diff=sell-bid;
  let vat=0, vatLbl='';   // 85㎡ 초과 건물분 부가세([9강]): 매도가를 건물·토지 기준시가 비율로 안분 → 건물분×10%
  if(document.getElementById('ssc_vatbox')){   // 85㎡ 초과 자동감지 시 섹션 존재 → 계산
    const bg=v('ssc_bldg'), gj=v('ssc_gongsi'), ar=v('ssc_area'), incl=((document.getElementById('ssc_vatincl')||{}).value==='포함');
    const landBase=gj*ar, denom=incl?(bg+landBase+bg*0.1):(bg+landBase);
    if(bg>0 && denom>0){ vat=Math.floor(sell*bg/denom*0.1); vatLbl='건물분 부가세('+(incl?'포함':'별도')+')'; }
  }
  const over85chk=!!((document.getElementById('ssc_over85')||{}).checked);   // 취등록세: 농특세 적용 여부
  const AD=acqDetail(bid, over85chk, v('ssc_malso'), v('ssc_chae')*W);       // 취등록세 상세
  const acq=AD.total;                                                        // 취등록세 합계 → 비용 반영
  const _ab=document.getElementById('ssc_acqbox');
  if(_ab){
    const ar=(k,val)=>'<div class="dg-orow"><span>'+k+'</span><b>'+won(val)+'</b></div>';
    _ab.innerHTML='<div class="ss-acqhd">취등록세 상세 (취득세율계 '+AD.rateTot+'%)</div>'
      +ar('취득세 ('+AD.base+'%)',AD.acq)
      +(AD.nong?ar('농어촌특별세 (85㎡↑ 0.2%)',AD.nong):'')
      +ar('지방교육세 (취득세×10%)',AD.edu)
      +ar('말소등록세 ('+v('ssc_malso')+'건)',AD.malso)
      +ar('인지세',AD.inji)
      +(AD.chae?ar('국민주택채권',AD.chae):'')
      +'<div class="dg-orow ss-acqtot"><span>취등록세 합계</span><b>'+won(AD.total)+'</b></div>';
  }
  const _aref=document.getElementById('ssc_acqref');   // 취득세 기준표(근거) + 적용구간 하이라이트
  if(_aref){
    const eokB=bid/1e8, brI=eokB<=6?0:(eokB<=9?1:2);
    const refRows=[['6억 이하','1.0%','0.1%','1.1 / 1.3%'],['6~9억','1~3%','0.2%','2.2~2.4%'],['9억 초과','3.0%','0.3%','3.3 / 3.5%']];
    _aref.innerHTML='<div class="ss-acqhd">취득세 기준표 (금액·전용면적)</div>'
      +'<table class="ss-reftbl"><tr><th>구간</th><th>취득세</th><th>교육세</th><th>계 85↓/↑</th></tr>'
      +refRows.map((r,i)=>'<tr'+(i===brI?' class="on"':'')+'>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')
      +'</table><div class="ss-refnote">농특세=85㎡ 초과만 0.2% · 6~9억은 금액 따라 1~3%(현재 적용구간 노랑)</div>';
  }
  const appr=(+((DETAIL&&DETAIL.appraisal_price))||0);   // 감정가(원)
  const loanAppr=appr*limAppr/100, loanBid=bid*limBid/100;   // 감정가한도 vs 낙찰가한도
  const useAppr=appr>0 && loanAppr<loanBid;                  // 감정가 있으면 둘 중 낮은 금액
  const loan=useAppr?loanAppr:loanBid;
  const baseLbl=useAppr?('감정가 '+limAppr+'%'):('낙찰가 '+limBid+'%');
  const mInt=loan*intR/100/12, preInt=loan*preR/100, holdInt=months*mInt;
  const inc=Math.max(0,diff), tb=ssTax(inc), taxGross=inc*tb.rate/100, taxNet=Math.max(0,taxGross-tb.ded);
  const costs=preInt+holdInt+acq+law+mgmt+evict+repair+broker+vat+etc;
  const net=diff-costs-taxNet;
  const capital=bid-loan, transfer=capital-dep, total=dep+transfer+(costs+taxGross);
  const yld=capital>0?net/capital*100:null;
  const row=(k,val,hot)=>`<div class="dg-orow"><span>${k}</span><b${hot?(' style="color:'+(typeof hot==='string'?hot:'#c0392b')+'"'):''}>${val}</b></div>`;
  const pct=x=>x==null?'-':(x<0?'−':'')+Math.abs(x).toFixed(1)+'%';
  out.innerHTML=row('차익(매도−낙찰)',won(diff),1)
    +row('대출('+baseLbl+'·낮은쪽)',won(loan))+row('월 이자',won(mInt))+row('중도상환이자',won(preInt))+row('보유기간이자('+months+'개월)',won(holdInt))
    +row('취등록세 합계',won(acq))
    +(vat>0?row(vatLbl,won(vat)):'')
    +row('종소세('+tb.rate+'%·누진'+won(tb.ded)+')',won(taxNet))
    +row('순수익',won(net),'#ff0000')
    +(yld!=null?row('자본 대비 수익률',pct(yld)):'')
    +row('대출외 자본금',won(capital),1)+row('소유권이전 필요금(법무제외)',won(transfer))
    +row('총 필요금액',won(total),1);
}

  const e=document.getElementById('ssc_bid'); if(!e || window.SS_BIDEDIT) return;

function wireShortSale(){
  ['ssc_bid','ssc_sell','ssc_dep','ssc_law','ssc_mgmt','ssc_evict','ssc_repair','ssc_broker','ssc_etc','ssc_bldg','ssc_gongsi'].forEach(id=>{ const e=document.getElementById(id); if(e){ dgFmt(e); e.oninput=()=>{ dgFmt(e); if(id==='ssc_bid') window.SS_BIDEDIT=true; if(id==='ssc_sell') window.SS_SELLEDIT=true; ssCalc(); }; } });
  ['ssc_lim_appr','ssc_lim_bid','ssc_int','ssc_pre','ssc_months','ssc_area'].forEach(id=>{ const e=document.getElementById(id); if(e) e.oninput=ssCalc; });
  const _msw=document.getElementById('ssc_malso'); if(_msw) _msw.oninput=()=>{ window.SS_MALSOEDIT=true; ssCalc(); };   // 말소 수동수정 시 자동집계 중단
  ['ssc_chae'].forEach(id=>{ const e=document.getElementById(id); if(e){ dgFmt(e); e.oninput=()=>{ dgFmt(e); ssCalc(); }; } });
  ['ssc_vatincl','ssc_over85'].forEach(id=>{ const e=document.getElementById(id); if(e) e.onchange=ssCalc; });
  // 85㎡ 부가세 섹션은 전용면적으로 자동 노출(체크박스 제거됨)
  ssCalc();
}

async function ssAutoVat(){   // 85㎡ 초과 건물분 부가세: 공시가 자동조회 → 건물기준시가·개별공시지가 자동주입(빈 칸만)
  if(!document.getElementById('ssc_vatbox')) return;
  const d=DETAIL||{}; if(!d.address) return;
  const area=parseFloat((String(d.building_area||'').match(/[\d.]+/)||[''])[0])||0;
  const la=parseFloat((String(d.land_area||'').match(/[\d.]+/)||[''])[0])||0;
  try{
    const r=await fetch(`/auction/building_vat?addr=${encodeURIComponent(d.address)}&area=${area}&land_area=${la}`);
    const v=await r.json();
    const fmt=n=>String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,',');
    const eg=document.getElementById('ssc_gongsi'); if(eg && !eg.value && v.land_price) eg.value=fmt(v.land_price);
    const eb=document.getElementById('ssc_bldg'); if(eb && !eb.value && v.bldg_std) eb.value=fmt(v.bldg_std);
    if(v.land_price||v.bldg_std){ const h=document.querySelector('#shortSaleBox .ss-vat-h'); if(h && !/자동조회/.test(h.textContent)) h.insertAdjacentHTML('beforeend',' <span style="color:#16a34a;font-weight:600">· 공시가 자동조회(추정)</span>'); }
    ssCalc();
  }catch(e){}
}

function kbPass(x){

}
function kbUnique(key){

  if(key==='area') return [...new Set(KB_LISTINGS.map(x=>x.area_excl))].sort((a,b)=>a-b);

function kbUpdateSummary(rows){

  const cnt=document.getElementById('kbCount'); if(cnt) cnt.textContent=rows.length;

  const byDong={};
  rows.forEach(x=>{ const d=String(x.dong||'').trim(); if(!d||d==='null') return; const p=(x.price||0)*10000; if(p>0 && (byDong[d]==null||p<byDong[d])) byDong[d]=p; });
  const ents=Object.entries(byDong).sort((a,b)=>a[1]-b[1]);
  const dbox=(e)=> e ? `<b>${e[0]}</b>동 <span class="kb-dprice">${won(e[1])}</span>` : '-';
  const setH=(id,h)=>{ const e=document.getElementById(id); if(e) e.innerHTML=h; };
  setH('kbDongHi', dbox(ents.length?ents[ents.length-1]:null));
  setH('kbDongLo', dbox(ents.length?ents[0]:null));

  pop.addEventListener('click',e=>e.stopPropagation());

  pop.innerHTML=`<div class="apt-pop-hd">${title}<button class="apt-pop-clr" onclick="kbClear('${key}')">전체</button></div>`+

function drawZone(map, geo, color, opacity, strokeW, strokeO){
  const made=[];                                            // 생성된 Polygon들 반환(격리 토글용)
  if(!geo||!geo.coordinates) return made;
  const polys = geo.type==="MultiPolygon" ? geo.coordinates : [geo.coordinates];
  polys.forEach(poly=>{
    const paths = poly.map(ring=> ring.map(co=> new kakao.maps.LatLng(co[1], co[0])));  // GeoJSON [lng,lat]→LatLng
    made.push(new kakao.maps.Polygon({map, path:paths, strokeWeight:(strokeW||1), strokeColor:color, strokeOpacity:(strokeO==null?.5:strokeO), fillColor:color, fillOpacity:opacity}));
  });
  return made;
}

function mbBiddable(result){
  const r=(result||"").trim();
  if(!r) return true;                                    // 결과 미정 = 진행중
  if(/^(신건|유찰|재진행|재매각|진행)/.test(r)) return true;   // '재매각'을 '매각'보다 먼저
  if(/(매각|배당|납부|취하|기각|정지|미진행|대금미납|변경|불허|각하|낙찰|종국|취소)/.test(r)) return false;
  return true;
}

async function submitMockBid(){
  const el=document.getElementById("mbAmt"); const man=Math.round(+(((el&&el.value)||"").replace(/[^0-9]/g,"")));
  if(!man||man<=0){ alert("입찰가(만원)를 입력하세요."); return; }
  const amt=man*10000;
  const snap={case_no:DETAIL.case_no,case_label:DETAIL.case_label,address:DETAIL.address,usage:DETAIL.usage,
              min_price:DETAIL.min_price,appraisal_price:DETAIL.appraisal_price,
              sell_date:DETAIL.sell_date,court:DETAIL.court_name||DETAIL.court,result:DETAIL.result};
  try{
    const r=await fetch("/mock_bid",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({item_key:itemKey,bid_amount:amt,data:snap})});
    if(r.status===401){ if(confirm("로그인이 필요합니다. 로그인하시겠어요?")) location.href="/static/login.html?next="+encodeURIComponent(location.pathname+location.search); return; }
    const j=await r.json().catch(()=>({}));
    if(!j.ok){ alert(j.message||j.error||"등록에 실패했습니다."); return; }
    const h=document.getElementById("mbHint"); if(h) h.innerHTML=`✔ 등록됨: <b>${won(amt)}</b> · <a href="/static/mypage_mockbid.html">마이페이지 › 모의입찰목록</a>`;
    const b=document.querySelector(".mbcard .mb-btn"); if(b) b.textContent="입찰가 수정";
    alert("모의입찰이 등록되었습니다.\n마이페이지 › 모의입찰목록에서 확인하세요.");
  }catch(e){ alert("네트워크 오류로 등록하지 못했습니다."); }
}

.aibot-card-prices .k{color:#6b6a64;font-weight:400;font-size:11px;margin-right:1px;}
.aibot-card-grade{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.aibot-card-grade.g-ok{background:#e7f6ec;color:#1f7a3d;}.aibot-card-grade.g-mid{background:#fff4e0;color:#9a6b0b;}.aibot-card-grade.g-no{background:#fdeaea;color:#c0392b;}
</style>
<button id="aibot-btn" onclick="aibotToggle()" title="AI 도우미">AI</button>
<div id="aibot-panel">
  <div class="aibot-head"><span>🤖 JH옥션스쿨 AI 도우미</span><button onclick="aibotToggle()">✕</button></div>
  <div id="aibot-msgs"></div>
  <div class="aibot-input"><input id="aibot-in" placeholder="경매·사이트 이용, 무엇이든 물어보세요" onkeydown="if(event.key===String.fromCharCode(69,110,116,101,114))aibotSend()"><button onclick="aibotSend()">전송</button></div>
</div>
<script>
var aibotHist=[], aibotBusy=false, aibotSeen=[], aibotCtx={}, aibotLast=[];
function aibotWon(n){n=Math.round(+n||0);if(!n)return"";var e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4);var s="";if(e)s+=e+"억";if(m)s+=(e?" ":"")+m.toLocaleString()+"만";return s||n.toLocaleString();}
function aibotCards(cards){
  var box=document.getElementById("aibot-msgs");
  var wrap=document.createElement("div"); wrap.className="aibot-cards";
  wrap.innerHTML=cards.map(function(c){
    var pf=c["예상차익"]; var badge=(pf&&pf>0)?('<span class="aibot-card-badge">+'+aibotWon(pf)+' 차익</span>'):"";
    var gr=c["매수판정"]; var gcls=gr==="매수양호"?"g-ok":(gr==="매수금지"?"g-no":"g-mid");
    var grade=gr?('<span class="aibot-card-grade '+gcls+'">'+gr+'</span>'):"";
    var th=c["thumb"]; var img=th?('<img src="'+th+'" onerror="this.parentNode.innerHTML=&#39;<div class=aibot-card-noimg>&#127968;</div>&#39;">'):'<div class="aibot-card-noimg">&#127968;</div>';
    var tag=c["유형"]?('<span class="aibot-card-tag">'+c["유형"]+'</span>'):"";
    var appr=c["감정가"]?('<span class="k">감정</span>'+aibotWon(c["감정가"])):"";
    var low=c["최저가"]?('<span class="k">최저</span>'+aibotWon(c["최저가"])):"";
    var est=c["시세"]?('<span class="k">시세</span>'+aibotWon(c["시세"])):"";
    return '<a class="aibot-card" href="'+(c["링크"]||"#")+'" target="_blank">'
      +'<div class="aibot-card-img">'+img+badge+tag+'</div>'
      +'<div class="aibot-card-body">'
      +'<div class="aibot-card-case">'+(c["사건번호"]||"물건")+grade+'</div>'
      +'<div class="aibot-card-addr">'+(c["소재지"]||"")+'</div>'
      +'<div class="aibot-card-prices">'+appr+(appr&&low?' · ':'')+low+((appr||low)&&est?' · ':'')+est+'</div>'
      +'</div></a>';
  }).join("");
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}
function aibotToggle(){
  var p=document.getElementById("aibot-panel");
  p.classList.toggle("on");
  if(p.classList.contains("on") && !aibotHist.length) aibotPush("a","안녕하세요! JH옥션스쿨 AI 도우미입니다. 권리분석·예상낙찰가·회원등급 등 궁금한 점을 물어보세요.");
  if(p.classList.contains("on")) document.getElementById("aibot-in").focus();
}
function aibotPush(role,text){
  var box=document.getElementById("aibot-msgs");
  var d=document.createElement("div");
  d.className="aibot-msg "+(role==="u"?"u":"a");
  d.textContent=text; box.appendChild(d); box.scrollTop=box.scrollHeight;
  return d;
}
async function aibotSend(){
  if(aibotBusy) return;
  var inp=document.getElementById("aibot-in");
  var msg=(inp.value||"").trim(); if(!msg) return;
  inp.value=""; aibotPush("u",msg); aibotHist.push({role:"user",content:msg});
  aibotBusy=true; var typing=aibotPush("a","…");
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},cache:"no-store",
      body:JSON.stringify({message:msg,history:aibotHist.slice(-20),seen:aibotSeen.slice(-40),ctx:aibotCtx,last:aibotLast})});
    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
</script>
</body>
</html>
