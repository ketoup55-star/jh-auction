<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마이페이지 · 관심경매물건 — JH옥션스쿨</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#dfe3ea;--text:#1c1c1a;--muted:#6b6a64;
        --primary:#1f4fa3;--labeltx:#2c5db0;--danger:#c0392b;--label:#eef2fb;--safe:#2f7d4f;--warn:#9a6b0b;--hotred:#e8202a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  a{color:inherit;}
  /* 공통 상단 헤더(홈과 동일, 고정) */
  .sitehead{position:sticky;top:0;z-index:50;}
  .top{background:var(--card);border-bottom:1px solid var(--line);}
  .topin{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px;}
  .minicase{display:flex;align-items:center;gap:6px;}
  .minicase .t{font-weight:600;color:var(--primary);font-size:13px;white-space:nowrap;}
  .minicase .ty{color:var(--muted);font-size:13px;white-space:nowrap;}
  .minicase select,.minicase input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;}
  .minicase input{width:150px;}
  .minicase .csearch{height:30px;width:34px;border:1px solid var(--primary);background:var(--primary);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;}
  .minicase .csearch:hover{background:#163c80;}
  .brand{flex:1;text-align:center;font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--primary);text-decoration:none;}
  .brand span{color:#3a7bd5;}
  .util{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;}
  .util a,.util button{color:var(--muted);text-decoration:none;background:none;border:none;cursor:pointer;font-size:12px;}
  .util .pay{color:var(--danger);font-weight:600;}
  .nav{background:var(--card);border-bottom:2px solid var(--primary);}
  .navin{max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap;}
  .nav a{padding:14px 18px;font-size:15px;font-weight:600;color:#333;text-decoration:none;}
  .nav a:hover,.nav a.on{color:var(--primary);}
  .wrap{max-width:1180px;margin:18px auto;padding:0 16px;display:grid;grid-template-columns:188px 1fr;gap:18px;align-items:start;}
  /* 사이드바 */
  .side{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .side .me{padding:16px 14px;border-bottom:1px solid var(--line);}
  .side .me .nm{font-size:15px;font-weight:700;}.side .me .em{font-size:12px;color:var(--muted);margin-top:2px;}
  .side .me .grade{display:inline-block;margin-top:8px;font-size:11px;font-weight:600;background:var(--label);color:var(--primary);padding:3px 9px;border-radius:7px;}
  .side nav a{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;font-size:13px;
    color:var(--text);text-decoration:none;border-bottom:1px solid var(--line);}
  .side nav a:last-child{border-bottom:none;}
  .side nav a:hover{background:#f7f9fc;}
  .side nav a.on{background:var(--primary);color:#fff;font-weight:700;}
  .side nav a .ar{color:#b9c2d4;font-size:12px;}.side nav a.on .ar{color:#cfe0ff;}
  /* 본문 */
  .main{min-width:0;}
  .phead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 14px;}
  .phead h1{font-size:22px;font-weight:700;margin:0;}
  .crumb{font-size:12px;color:var(--muted);}.crumb b{color:var(--primary);}
  .tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px 10px 0 0;overflow:hidden;}
  .tabs button{flex:1;background:#f7f9fc;border:none;border-right:1px solid var(--line);padding:13px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
  .tabs button:last-child{border-right:none;}
  .tabs button.on{background:var(--card);color:var(--primary);border-bottom:2px solid var(--primary);}
  .panel{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;padding:16px;margin-bottom:14px;}
  /* 필터 */
  .ftbl{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);}
  .ftbl th,.ftbl td{border:1px solid var(--line);padding:8px 10px;vertical-align:middle;}
  .ftbl th{background:var(--label);color:var(--labeltx);font-weight:600;width:86px;white-space:nowrap;text-align:center;}
  .ftbl td{}
  .ftbl select,.ftbl input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;background:#fff;}
  .ftbl input[type=text]{width:100%;}
  .ftbl .sep{color:var(--muted);margin:0 2px;}
  .ftbl td select{margin:1px 2px 1px 0;}
  .ftbl select:disabled,.ftbl input:disabled{background:#f1f1ee;color:#9a9a93;cursor:not-allowed;}
  .searchbtn{display:block;margin:14px auto 0;height:42px;padding:0 60px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
  /* 전체법원 */
  .courts{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;gap:8px;}
  .courts .hd{flex:0 0 64px;font-weight:700;color:var(--primary);font-size:13px;padding-top:2px;}
  .courts .list{display:flex;flex-wrap:wrap;gap:6px 18px;}
  .courts .ci{font-size:13px;color:var(--muted);white-space:nowrap;cursor:pointer;}
  .courts .ci:hover{color:var(--primary);}.courts .ci b{color:var(--primary);}
  /* 툴바 */
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .toolbar select{height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;background:#fff;}
  .toolbar .tot{font-size:13px;color:var(--muted);}.toolbar .tot b{color:var(--hotred);}
  .toolbar .sp{margin-left:auto;}
  .tbtn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:12px;cursor:pointer;color:var(--text);}
  .tbtn.b{background:var(--primary);color:#fff;border-color:var(--primary);}
  .tbtn.o{background:#f59f00;color:#fff;border-color:#f59f00;}
  /* 물건 카드 */
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:40px;background:var(--card);border:1px solid var(--line);border-radius:10px;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden;}
  .item .ih{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);background:#fafbfc;}
  .item .ih .tt{font-size:15px;font-weight:700;color:var(--primary);}
  .item .ih .meta{font-size:12px;color:var(--muted);display:flex;gap:14px;align-items:center;}
  .item .ih .meta .del{color:var(--danger);background:none;border:none;cursor:pointer;font-size:12px;}
  .item .ib{display:flex;gap:14px;padding:14px;}
  .item .thumb{flex:0 0 150px;}
  .item .thumb img{width:150px;height:118px;object-fit:cover;border-radius:6px;background:var(--label);display:block;}
  .item .thumb .ov{margin-top:5px;text-align:center;font-size:12px;color:var(--danger);font-weight:600;line-height:1.5;}
  .igrid{flex:1;border-collapse:collapse;font-size:13px;}
  .igrid th,.igrid td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:middle;}
  .igrid th{background:var(--label);color:var(--labeltx);font-weight:600;width:74px;white-space:nowrap;text-align:center;}
  .igrid td.low{color:var(--hotred);font-weight:600;}
  .igrid .warn{color:var(--danger);font-weight:600;}
  .acts{flex:0 0 92px;display:flex;flex-direction:column;gap:7px;}
  .acts a{display:flex;align-items:center;justify-content:center;gap:4px;height:34px;border-radius:6px;background:var(--primary);color:#fff;text-decoration:none;font-size:12px;font-weight:600;}
  .acts a.map{background:#3a7bd5;}
  .igrid th{width:62px;}
  .item .ih .meta{gap:12px;}
  .impsel{height:24px;border:1px solid var(--line);border-radius:5px;font-size:11px;padding:0 2px;background:#fff;color:var(--text);}
  .memorow{display:flex;gap:8px;align-items:center;}
  .memo{flex:1;min-width:0;height:30px;border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px;resize:vertical;font-family:inherit;transition:background .3s;}
  @media(max-width:900px){ .wrap{grid-template-columns:1fr;} .item .ib{flex-wrap:wrap;} }
  /* 부동산DB '전국' 스티커 — 점멸 + hover 시 좌우 기울기(프리미엄 스티커와 동일 형식) */
  @keyframes natlBlink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes natlWobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}55%{transform:rotate(9deg)}80%{transform:rotate(-4deg)}}
  .natllink{position:relative;}
  .natl-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;
    background:linear-gradient(180deg,#3f7ce2,#1f4fa3);border:1px solid #1a4590;border-radius:5px;
    padding:1px 7px;line-height:16px;white-space:nowrap;
    animation:natlBlink 1.5s ease-in-out infinite;transform-origin:center;
    position:absolute;top:3px;right:-15px;box-shadow:0 1px 5px rgba(20,60,120,.45);z-index:3;}
  .natllink:hover>.natl-badge{animation:natlWobble .55s ease-in-out;}
  @media(prefers-reduced-motion:reduce){.natl-badge{animation:none!important;}}
</style>
</head>

    </div>
    <nav>
      <a class="on" href="/static/mypage.html">관심경매물건 <span class="ar">›</span></a>
      <a href="/static/mypage_gongmae.html">관심공매물건 <span class="ar">›</span></a>

<script>
let FAVS=[], TAB="전체";
function won(raw,n){ if(raw) return Number(String(raw).replace(/[^0-9]/g,"")).toLocaleString()+"원";
  n=Math.round(n||0); if(!n) return "-"; return n.toLocaleString()+"원"; }
function ratioOf(L){ return L.appraisal_price? Math.round(100*L.min_price/L.appraisal_price):null; }
function soon(e){ e.preventDefault(); alert("준비 중인 메뉴입니다."); }
function logout(){ fetch("/auth/logout",{method:"POST"}).then(()=>location.href="/"); }
// 상단 헤더: 사건검색 연도 채우기 + 검색
(function(){ const s=document.getElementById("caseYear"); if(!s)return;
  const n=new Date().getFullYear(); for(let y=n;y>=2008;y--){const o=document.createElement("option");o.value=y;o.textContent=y;s.appendChild(o);} })();
function caseSearch(){ const y=document.getElementById("caseYear").value, no=document.getElementById("caseNoIn").value.trim();
  const p=new URLSearchParams(); if(y)p.set("year",y); if(no)p.set("keyword",no);
  location.href="/static/auctions.html"+(p.toString()?"?"+p.toString():""); }

function isDone(L){ return /종결|배당|취하|기각|각하|납부|매각허가|완료/.test((L.status||"")+(L.result||"")); }
function isToday(L){ const t=new Date().toISOString().slice(0,10); return String(L.sell_date||"").includes(t); }
function tabFilter(L){ if(TAB==="진행물건") return !isDone(L); if(TAB==="종결물건") return isDone(L); if(TAB==="금일물건") return isToday(L); return true; }

async function load(){
  const me=await fetch("/auth/me");
  if(me.status===401){ location.href="/static/login.html?next=/static/mypage.html"; return; }
  const u=await me.json();
  document.getElementById("uname").textContent=(u.name||u.email)+"님";
  document.getElementById("s_nm").textContent=u.name||u.email;
  document.getElementById("s_em").textContent=u.email;
  document.getElementById("s_grade").textContent=(u.grade||"무료")+" 회원";
  if(u.role==="admin"){ const ul=document.getElementById("util");
    if(ul && !ul.querySelector(".admin-link")) ul.insertAdjacentHTML("beforeend",
      `<a class="admin-link" href="/static/admin.html" style="color:#fff;background:#e23b3b;padding:2px 9px;border-radius:6px;font-weight:700;margin-left:5px;text-decoration:none">🔧 관리자</a>`); }
  const d=await (await fetch("/favorites")).json();
  FAVS=d.items||[];
  await loadRegions();          // 전국 법원·지역 옵션
  buildFilters(); render();
  loadPersonalFolders();        // 개인폴더 드롭다운 채우기(비동기)
}
async function loadPersonalFolders(){
  try{
    const d=await (await fetch("/folders")).json(); const fs=(d&&d.folders)||[];
    const sel=document.getElementById("f_pfolder"); if(!sel) return;
    const cur=sel.value;
    sel.innerHTML='<option value="">전체</option>'+fs.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join("");
    sel.value=cur;
  }catch(e){}
}
function openFolderMgr(){
  if(window.openFolderManager) window.openFolderManager(()=>loadPersonalFolders());
  else alert("폴더관리 모듈을 불러오지 못했습니다.");
}
let REGION={};   // (구버전·미사용)
let REG=null, SIDOSHORT={};   // 전국 법원·시도 데이터(/auctions/regions)
const USAGE_OPTS=["아파트","다세대 (빌라)","도시형생활 주택","주택","근린주택","다가구 (원룸등)","농가주택","오피스텔","근린상가","근린시설","숙박시설","승용자동차","SUV"];  // 경매검색 GROUPS와 동일 = 실제 DB usage_name만
const RESULT_OPTS=["진행중","재진행","재매각","낙찰완료","종결"];  // 실제 status_reason 값만
async function loadRegions(){ try{ REG=await (await fetch("/auctions/regions")).json(); }catch(e){ REG=null; } }
function parseAddr(addr){
  const t=(addr||"").split(/\s+/), sido=t[0]||""; let gu=[], dong="";
  for(let i=1;i<t.length;i++){
    if(/(동|읍|면|리)$/.test(t[i])){ dong=t[i]; break; }
    if(/^\d/.test(t[i])) break;                    // 지번/도로명 시작 → 중단
    if(/(시|군|구)$/.test(t[i])) gu.push(t[i]);
  }
  return {sido, gugun:gu.join(" "), dong};
}

    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
