<style>

  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

  .sitehead{position:sticky;top:0;z-index:50;}
  .top{background:var(--card);border-bottom:1px solid var(--line);}
  .topin{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px;}

  .brand span{color:#3a7bd5;}
  .util{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;}
  .util a{color:var(--muted);cursor:pointer;}
  .minicase{display:flex;align-items:center;gap:6px;}
  .minicase .t{font-weight:600;color:var(--primary);font-size:13px;white-space:nowrap;}
  .minicase .ty{color:var(--muted);font-size:13px;white-space:nowrap;}
  .minicase select,.minicase input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;}

  .minicase .csearch:hover{background:#163c80;}
  .nav{background:var(--card);border-bottom:2px solid var(--primary);}
  .navin{max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap;}
  .nav a{padding:14px 18px;font-size:15px;font-weight:600;color:#333;}.nav a:hover,.nav a.on{color:var(--primary);}
  .wrap{max-width:1180px;margin:18px auto;padding:0 16px;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:start;}
  .side{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .side .me{padding:14px;border-bottom:1px solid var(--line);}
  .side .me .nm{font-size:16px;font-weight:700;}.side .me .em{font-size:12px;color:var(--muted);margin-top:2px;}

  .side nav a.on{background:var(--primary);color:#fff;font-weight:700;}
  .main{min-width:0;}
  .phead{display:flex;justify-content:space-between;align-items:center;margin:2px 2px 14px;}
  .phead h1{font-size:22px;font-weight:700;margin:0;}.crumb{font-size:12px;color:var(--muted);}.crumb b{color:var(--primary);}
  .ftbl{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);background:var(--card);margin-bottom:12px;}
  .ftbl th,.ftbl td{border:1px solid var(--line);padding:9px 10px;}
  .ftbl th{background:var(--label);color:var(--labeltx);font-weight:600;width:96px;white-space:nowrap;text-align:center;}
  .ftbl select,.ftbl input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;background:#fff;}
  .ftbl input[type=text]{width:100%;}
  .tot{font-size:13px;color:var(--muted);margin:4px 2px 10px;}.tot b{color:var(--hotred);font-size:15px;}
  .gtbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .gtbl th{background:var(--label);color:var(--labeltx);font-size:12px;padding:10px 6px;border-bottom:1px solid var(--line);}
  .gtbl td{padding:10px 8px;border-bottom:1px solid var(--line);font-size:12px;vertical-align:top;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}.cc{text-align:center;}.low{color:var(--hotred);font-weight:600;}
  .memo{width:100%;min-height:34px;border:1px solid var(--line);border-radius:5px;padding:4px 6px;font-size:12px;resize:vertical;font-family:inherit;}
  .tbtn{height:26px;padding:0 9px;border:1px solid var(--line);background:#fff;border-radius:6px;font-size:11.5px;cursor:pointer;margin-top:3px;}
  .del{color:var(--danger);border:none;background:none;cursor:pointer;font-size:12px;}
  .notice{background:#fff7e6;border:1px solid #f0d9a8;border-radius:10px;padding:26px;color:#9a6b0b;font-size:13px;line-height:1.7;text-align:center;}
  @media(max-width:900px){ .wrap{grid-template-columns:1fr;} }
  /* 부동산DB '전국' 스티커 — 점멸 + hover 시 좌우 기울기(프리미엄 스티커와 동일 형식) */
  @keyframes natlBlink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes natlWobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}55%{transform:rotate(9deg)}80%{transform:rotate(-4deg)}}
  .natllink{position:relative;}
  .natl-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;
    background:linear-gradient(180deg,#3f7ce2,#1f4fa3);border:1px solid #1a4590;border-radius:5px;
    padding:1px 7px;line-height:16px;white-space:nowrap;
    animation:natlBlink 1.5s ease-in-out infinite;transform-origin:center;
    position:absolute;top:3px;right:-15px;box-shadow:0 1px 5px rgba(20,60,120,.45);z-index:3;}
  .natllink:hover>.natl-badge{animation:natlWobble .55s ease-in-out;}
  @media(prefers-reduced-motion:reduce){.natl-badge{animation:none!important;}}
</style>
</head>

          <th>물건명/소재지</th><td><input type="text" id="f_kw" placeholder="물건명·소재지 검색" oninput="render()"></td></tr>

<script>
let FAVS=[];
function won(n){ n=Math.round(+n||0); if(!n)return"-"; const e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4); let s=""; if(e)s+=e+"억 "; if(m)s+=m.toLocaleString()+"만"; if(!s)s=n.toLocaleString(); return s.trim()+"원"; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function logout(){ await fetch("/auth/logout",{method:"POST"}); location.href="/"; }

async function load(){
  const me=await fetch("/auth/me");
  if(me.status===401){ location.href="/static/login.html?next=/static/mypage_gongmae.html"; return; }
  const u=await me.json();
  document.getElementById("s_nm").textContent=u.name||u.email||"-";
  document.getElementById("s_em").textContent=u.email||"";
  document.getElementById("util").innerHTML=`<span style="color:var(--primary);font-weight:600">${esc(u.name||u.email)}님</span> <a onclick="logout()">로그아웃</a> <a href="/static/mypage.html">정보수정</a> <a href="/static/mypage.html">마이페이지</a> <a href="/static/payment.html" class="pay">요금결제</a>`;
  const d=await (await fetch("/gongmae/favorites")).json();
  FAVS=d.items||[];
  buildFilters(); render();
}
function buildFilters(){
  const last=s=>(s||"").split(" ").pop();
  const fill=(id,arr)=>{ const s=document.getElementById(id); const cur=s.value; s.innerHTML='<option value="">전체</option>'+[...new Set(arr.filter(Boolean))].map(x=>`<option>${esc(x)}</option>`).join(""); s.value=cur; };
  fill("f_usage",FAVS.map(f=>last(f.usage))); fill("f_disposal",FAVS.map(f=>f.disposal)); fill("f_prop",FAVS.map(f=>f.prop_type));
}
function render(){
  const u=document.getElementById("f_usage").value, dp=document.getElementById("f_disposal").value, pr=document.getElementById("f_prop").value, kw=document.getElementById("f_kw").value.trim();
  const rows=FAVS.filter(f=>{
    if(u && !(f.usage||"").includes(u)) return false;
    if(dp && f.disposal!==dp) return false;
    if(pr && f.prop_type!==pr) return false;
    if(kw && !((f.name||"")+(f.address||"")).includes(kw)) return false;
    return true;
  });
  document.getElementById("tot").textContent=rows.length;
  const box=document.getElementById("list");
  if(!rows.length){ box.innerHTML='<div class="notice">관심 등록한 공매물건이 없습니다.<br>상단 <b>공매</b> 메뉴의 목록에서 ♡를 눌러 등록하세요.</div>'; return; }
  box.innerHTML=`<table class="gtbl"><thead><tr>
    <th style="width:116px">물건관리번호</th><th>물건명 / 소재지</th><th style="width:80px">용도</th>
    <th style="width:108px">감정가<br>최저입찰가</th><th style="width:120px">입찰기간</th><th style="width:54px">처분</th>
    <th style="width:186px">메모</th><th style="width:56px">관심</th></tr></thead><tbody>`+
    rows.map(f=>{
      const ratio=f.appraisal_price?Math.round(100*f.min_price/f.appraisal_price):null;
      const mn=esc(f.manage_no);
      return `<tr>
        <td class="cc">${mn||"-"}</td>
        <td><div style="display:flex;gap:9px;align-items:center">
          ${f.thumb?`<img src="${esc(f.thumb)}" referrerpolicy="no-referrer" loading="lazy" style="width:62px;height:48px;object-fit:cover;border-radius:5px;flex:none;border:1px solid var(--line)" onerror="this.style.display='none'">`:""}
          <div style="min-width:0"><b style="cursor:pointer;color:var(--primary)" onclick="openGm('${mn}')">${esc(f.name||"-")}</b><div style="color:var(--muted);margin-top:2px">${esc(f.address||"")}</div></div></div></td>
        <td class="cc">${esc((f.usage||"").split(" ").pop()||"-")}</td>
        <td class="num">${won(f.appraisal_price)}<br><span class="low">${won(f.min_price)}${ratio!=null?` (${ratio}%)`:""}</span></td>
        <td class="cc">${esc((f.bid_begin||"").slice(0,10))}<br>~ ${esc((f.bid_close||"").slice(0,10))}</td>
        <td class="cc">${esc(f.disposal||"-")}</td>
        <td><textarea class="memo" id="m_${mn}" placeholder="메모 입력">${esc(f.memo||"")}</textarea><button class="tbtn" onclick="saveMemo('${mn}')">메모저장</button></td>
        <td class="cc"><button class="del" onclick="removeFav('${mn}')">♥ 삭제</button></td>
      </tr>`;
    }).join("")+`</tbody></table>`;
}
function openGm(mn){ const f=FAVS.find(x=>x.manage_no===mn); if(f){ sessionStorage.setItem("gm_item",JSON.stringify(f)); location.href="/static/gongmae_detail.html"; } }
async function saveMemo(mn){
  const f=FAVS.find(x=>x.manage_no===mn); if(!f) return;
  const memo=document.getElementById("m_"+mn).value; f.memo=memo;
  try{ const r=await fetch("/gongmae/favorites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({manage_no:mn,data:f,folder:f.folder||"기타",memo})});
    alert(r.ok?"메모 저장됨":"저장 실패"); }catch(e){ alert("네트워크 오류"); }
}
function soon(e){ if(e) e.preventDefault(); alert("준비 중인 메뉴입니다."); }
(function(){ var s=document.getElementById("caseYear"); if(!s)return;
  var n=new Date().getFullYear(); for(var y=n;y>=2008;y--){var o=document.createElement("option");o.value=y;o.textContent=y;s.appendChild(o);} })();
function caseSearch(){ var y=document.getElementById("caseYear").value, no=document.getElementById("caseNoIn").value.trim();
  var p=new URLSearchParams(); if(y)p.set("year",y); if(no)p.set("keyword",no);
  location.href="/static/auctions.html"+(p.toString()?"?"+p.toString():""); }
async function removeFav(mn){
  if(!confirm("관심공매물건에서 삭제할까요?")) return;
  try{ await fetch("/gongmae/favorites/"+encodeURIComponent(mn),{method:"DELETE"}); }catch(e){}
  FAVS=FAVS.filter(x=>x.manage_no!==mn); buildFilters(); render();
}
load();
</script>
<style>
#aibot-btn{position:fixed;right:22px;bottom:22px;width:60px;height:60px;border-radius:50%;background:#1a73e8;color:#fff;border:none;font-size:22px;font-weight:800;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 20px -4px rgba(26,115,232,.6);z-index:9998;display:flex;align-items:center;justify-content:center;transition:transform .15s;animation:aibotTilt 4.5s ease-in-out infinite,aibotGlow 2.2s ease-in-out infinite;transform-origin:center bottom;}

.aibot-card-body{padding:10px 12px 11px;}
.aibot-card-case{font-size:13px;font-weight:800;color:#1f4fa3;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.aibot-card-addr{font-size:12px;color:#444;margin:3px 0 6px;line-height:1.45;}
.aibot-card-prices{font-size:13px;color:#1c1c1a;font-weight:700;}
.aibot-card-prices .k{color:#6b6a64;font-weight:400;font-size:11px;margin-right:1px;}
.aibot-card-grade{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.aibot-card-grade.g-ok{background:#e7f6ec;color:#1f7a3d;}.aibot-card-grade.g-mid{background:#fff4e0;color:#9a6b0b;}.aibot-card-grade.g-no{background:#fdeaea;color:#c0392b;}
</style>
<button id="aibot-btn" onclick="aibotToggle()" title="AI 도우미">AI</button>
<div id="aibot-panel">
  <div class="aibot-head"><span>🤖 JH옥션스쿨 AI 도우미</span><button onclick="aibotToggle()">✕</button></div>
  <div id="aibot-msgs"></div>
  <div class="aibot-input"><input id="aibot-in" placeholder="경매·사이트 이용, 무엇이든 물어보세요" onkeydown="if(event.key===String.fromCharCode(69,110,116,101,114))aibotSend()"><button onclick="aibotSend()">전송</button></div>
</div>
<script>
var aibotHist=[], aibotBusy=false, aibotSeen=[], aibotCtx={}, aibotLast=[];
function aibotWon(n){n=Math.round(+n||0);if(!n)return"";var e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4);var s="";if(e)s+=e+"억";if(m)s+=(e?" ":"")+m.toLocaleString()+"만";return s||n.toLocaleString();}
function aibotCards(cards){
  var box=document.getElementById("aibot-msgs");
  var wrap=document.createElement("div"); wrap.className="aibot-cards";
  wrap.innerHTML=cards.map(function(c){
    var pf=c["예상차익"]; var badge=(pf&&pf>0)?('<span class="aibot-card-badge">+'+aibotWon(pf)+' 차익</span>'):"";
    var gr=c["매수판정"]; var gcls=gr==="매수양호"?"g-ok":(gr==="매수금지"?"g-no":"g-mid");
    var grade=gr?('<span class="aibot-card-grade '+gcls+'">'+gr+'</span>'):"";
    var th=c["thumb"]; var img=th?('<img src="'+th+'" onerror="this.parentNode.innerHTML=&#39;<div class=aibot-card-noimg>&#127968;</div>&#39;">'):'<div class="aibot-card-noimg">&#127968;</div>';
    var tag=c["유형"]?('<span class="aibot-card-tag">'+c["유형"]+'</span>'):"";
    var appr=c["감정가"]?('<span class="k">감정</span>'+aibotWon(c["감정가"])):"";
    var low=c["최저가"]?('<span class="k">최저</span>'+aibotWon(c["최저가"])):"";
    var est=c["시세"]?('<span class="k">시세</span>'+aibotWon(c["시세"])):"";
    return '<a class="aibot-card" href="'+(c["링크"]||"#")+'" target="_blank">'
      +'<div class="aibot-card-img">'+img+badge+tag+'</div>'
      +'<div class="aibot-card-body">'
      +'<div class="aibot-card-case">'+(c["사건번호"]||"물건")+grade+'</div>'
      +'<div class="aibot-card-addr">'+(c["소재지"]||"")+'</div>'
      +'<div class="aibot-card-prices">'+appr+(appr&&low?' · ':'')+low+((appr||low)&&est?' · ':'')+est+'</div>'
      +'</div></a>';
  }).join("");
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}
function aibotToggle(){
  var p=document.getElementById("aibot-panel");
  p.classList.toggle("on");
  if(p.classList.contains("on") && !aibotHist.length) aibotPush("a","안녕하세요! JH옥션스쿨 AI 도우미입니다. 권리분석·예상낙찰가·회원등급 등 궁금한 점을 물어보세요.");
  if(p.classList.contains("on")) document.getElementById("aibot-in").focus();
}
function aibotPush(role,text){
  var box=document.getElementById("aibot-msgs");
  var d=document.createElement("div");
  d.className="aibot-msg "+(role==="u"?"u":"a");
  d.textContent=text; box.appendChild(d); box.scrollTop=box.scrollHeight;
  return d;
}
async function aibotSend(){
  if(aibotBusy) return;
  var inp=document.getElementById("aibot-in");
  var msg=(inp.value||"").trim(); if(!msg) return;
  inp.value=""; aibotPush("u",msg); aibotHist.push({role:"user",content:msg});
  aibotBusy=true; var typing=aibotPush("a","…");
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},cache:"no-store",
      body:JSON.stringify({message:msg,history:aibotHist.slice(-20),seen:aibotSeen.slice(-40),ctx:aibotCtx,last:aibotLast})});
    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
</script>
