<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>서류 보기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;color:#1c1c1a;background:#fff;display:flex;flex-direction:column;height:100vh;}
  .top{background:#2b3a67;color:#fff;padding:11px 18px;display:flex;align-items:center;gap:14px;flex:none;}
  .top .court{background:#fff;color:#2b3a67;font-weight:700;font-size:12px;border-radius:6px;padding:5px 10px;white-space:nowrap;line-height:1.25;text-align:center;}
  .top .ttl{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .top .x{cursor:pointer;font-size:20px;color:#fff;background:none;border:none;line-height:1;}
  .tabs{display:flex;flex-wrap:wrap;background:#eef0f4;border-bottom:1px solid #d7dbe2;padding:0 6px;flex:none;}
  .tab{padding:11px 14px;font-size:13px;color:#555;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;}
  .tab:hover{color:#1f4fa3;}
  .tab.on{color:#1f4fa3;font-weight:700;border-bottom-color:#1f4fa3;background:#fff;}
  .content{flex:1;min-height:0;background:#525659;}
  .content iframe{width:100%;height:100%;border:none;background:#fff;display:block;}
  .gallery{height:100%;overflow:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;background:#fff;align-content:start;}
  .gallery img{width:100%;border:1px solid #dfe3ea;border-radius:8px;cursor:zoom-in;transition:transform .12s,box-shadow .12s;}
  .gallery img:hover{transform:scale(1.01);box-shadow:0 4px 14px rgba(0,0,0,.15);}
  .empty{padding:50px;text-align:center;color:#9aa0a6;background:#fff;height:100%;}
  .lbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;z-index:1000;align-items:center;justify-content:center;}
  .lox.on,.lbox.on{display:flex;}
  #lbimg{max-width:92vw;max-height:88vh;object-fit:contain;box-shadow:0 6px 36px rgba(0,0,0,.55);}
  .lbx{position:absolute;top:14px;right:26px;color:#fff;font-size:34px;cursor:pointer;line-height:1;user-select:none;}
  .lbnav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:64px;cursor:pointer;padding:0 22px;user-select:none;opacity:.8;}
  .lbnav:hover{opacity:1;}
  .lbprev{left:4px;} .lbnext{right:4px;}
  .lbcount{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;background:rgba(0,0,0,.55);padding:5px 15px;border-radius:14px;}
</style></head>
<body>
<div class="top">
  <span class="court" id="court">-</span>
  <span class="ttl" id="ttl">불러오는 중…</span>
  <button class="x" onclick="window.close()" title="닫기">✕</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"><div class="empty">불러오는 중…</div></div>
<div id="lbox" class="lbox">
  <span class="lbx" onclick="lbClose()" title="닫기(Esc)">✕</span>
  <span class="lbnav lbprev" onclick="lbGo(-1)" title="이전(←)">‹</span>
  <img id="lbimg" alt="">
  <span class="lbnav lbnext" onclick="lbGo(1)" title="다음(→)">›</span>
  <span class="lbcount" id="lbcount"></span>
</div>
<script>
const itemKey=new URLSearchParams(location.search).get("item_key");
const initKind=new URLSearchParams(location.search).get("kind")||"";
const ICON={"photo":"📷","등기(집합)":"📄","등기(건물)":"📄","등기(토지)":"📄","등기":"📄","감정평가서":"📋","매각물건명세서":"📑","건축물대장":"🏢","토지임야대장":"🌳","차량기계원부":"🚗","사건내역":"📁","기일내역문서":"📅","문건접수송달":"✉️","현황조사서":"🔍","부동산표시":"📌"};
const LABEL={"photo":"사진/지적도","등기(집합)":"등기(집합)","등기(건물)":"건물등기","등기(토지)":"토지등기","등기":"등기","감정평가서":"감정평가서","매각물건명세서":"매각물건명세서","건축물대장":"건축물대장","토지임야대장":"토지임야대장","차량기계원부":"차량기계원부","사건내역":"사건내역","기일내역문서":"기일내역","문건접수송달":"문건접수/송달","현황조사서":"현황조사서","부동산표시":"부동산표시목록"};
const ORD=["photo","등기(집합)","등기(건물)","등기(토지)","등기","건축물대장","토지임야대장","차량기계원부","감정평가서","현황조사서","매각물건명세서","사건내역","기일내역문서","문건접수송달","부동산표시"];
let MEDIA=[], PHOTOS=[], LBI=0;
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
async function load(){
  const c=document.getElementById("content");
  if(!itemKey){ c.innerHTML='<div class="empty">item_key가 필요합니다.</div>'; return; }
  let r; try{ r=await fetch("/auction?item_key="+encodeURIComponent(itemKey)); }
  catch(e){ c.innerHTML='<div class="empty">서류 정보를 불러오지 못했습니다.</div>'; return; }
  if(r.status===401||r.status===403){ c.innerHTML='<div class="empty">🔒 물건 상세·서류는 <b>전국 등급 이상</b> 회원 전용입니다. <a href="/static/payment.html" style="color:var(--primary)">이용권 안내 · 결제</a></div>'; return; }
  let d; try{ d=await r.json(); }
  catch(e){ c.innerHTML='<div class="empty">서류 정보를 불러오지 못했습니다.</div>'; return; }
  document.getElementById("court").textContent=((d.court_name||d.court||"")+" "+(d.case_no||"")).trim()||"-";
  document.getElementById("ttl").textContent=d.address||"";
  document.title=(d.case_no||"서류")+" 서류";
  MEDIA=(d.media||[]).filter(m=>m.url);
  const hasSpec=MEDIA.some(m=>["등기(집합)","등기(건물)","등기(토지)"].includes(m.kind));
  const kinds=ORD.filter(k=>{ if(k==="등기"&&hasSpec) return false; return MEDIA.some(m=>m.kind===k); });
  const tabs=document.getElementById("tabs"); tabs.innerHTML="";
  kinds.forEach(k=>{ const b=document.createElement("button"); b.className="tab"; b.dataset.kind=k;
    b.innerHTML=(ICON[k]||"📄")+" "+esc(LABEL[k]||k); b.onclick=()=>show(k); tabs.appendChild(b); });
  if(!kinds.length){ c.innerHTML='<div class="empty">등록된 서류가 없습니다.</div>'; return; }
  show(kinds.includes(initKind)?initKind:kinds[0]);
}
function show(kind){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.kind===kind));
  const items=MEDIA.filter(m=>m.kind===kind), c=document.getElementById("content");
  if(!items.length){ c.innerHTML='<div class="empty">문서 없음</div>'; return; }
  if(kind==="photo"){
    PHOTOS=items.map(m=>m.url);
    c.innerHTML='<div class="gallery">'+items.map((m,i)=>`<img src="${esc(m.url)}" loading="lazy" onclick="lbOpen(${i})">`).join("")+'</div>'; return;
  }
  const m=items[0], ct=(m.content_type||"");
  const src=ct.includes("html")?("/docview?item_key="+encodeURIComponent(itemKey)+"&kind="+encodeURIComponent(kind)):m.url;
  c.innerHTML=`<iframe src="${esc(src)}" title="${esc(LABEL[kind]||kind)}"></iframe>`;
}
// ── 사진 라이트박스(좌우 넘김 + 키보드 + 배경클릭 닫기) ──
const _lb=()=>document.getElementById('lbox');
function lbOpen(i){ if(!PHOTOS.length) return; LBI=(i+PHOTOS.length)%PHOTOS.length; document.getElementById('lbimg').src=PHOTOS[LBI]; document.getElementById('lbcount').textContent=(LBI+1)+' / '+PHOTOS.length; _lb().classList.add('on'); }
function lbGo(d){ lbOpen(LBI+d); }
function lbClose(){ _lb().classList.remove('on'); }
document.addEventListener('keydown',e=>{ if(!_lb().classList.contains('on')) return; if(e.key==='ArrowLeft')lbGo(-1); else if(e.key==='ArrowRight')lbGo(1); else if(e.key==='Escape')lbClose(); });
_lb().addEventListener('click',e=>{ if(e.target.id==='lbox')lbClose(); });   // 배경(이미지 바깥) 클릭 시 닫기
load();
</script>
</body></html>
