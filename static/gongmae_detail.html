<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공매물건 상세 — JH옥션스쿨</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#dfe3ea;--label:#eef2fb;--labeltx:#2c5db0;
        --text:#1c1c1a;--muted:#6b6a64;--primary:#1f4fa3;--danger:#c0392b;--hotred:#e8202a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  a{color:inherit;text-decoration:none;}
  .sitehead{position:sticky;top:0;z-index:50;}
  .top{background:var(--card);border-bottom:1px solid var(--line);}
  .topin{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px;}
  .minicase{display:flex;align-items:center;gap:6px;}
  .minicase .t{font-weight:600;color:var(--primary);font-size:13px;white-space:nowrap;}
  .minicase .ty{color:var(--muted);font-size:13px;white-space:nowrap;}
  .minicase select,.minicase input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;}
  .minicase input{width:150px;}
  .minicase .csearch{height:30px;width:34px;border:1px solid var(--primary);background:var(--primary);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;}
  .brand{flex:1;text-align:center;font-size:24px;font-weight:700;color:var(--primary);text-decoration:none;}.brand span{color:#3a7bd5;}
  .util{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;}
  .util a{color:var(--muted);text-decoration:none;cursor:pointer;}
  .util .pay{color:var(--danger);font-weight:600;}
  .nav{background:var(--card);border-bottom:2px solid var(--primary);}
  .navin{max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap;}
  .nav a{padding:14px 18px;font-size:15px;font-weight:600;color:#333;text-decoration:none;}
  .nav a:hover,.nav a.on{color:var(--primary);}
  .wrap{max-width:1000px;margin:18px auto;padding:0 16px;}
  .back{font-size:13px;color:var(--primary);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px;}
  h1{font-size:20px;font-weight:700;margin:6px 0 2px;}
  .sub{font-size:13px;color:var(--muted);}
  .kgrid{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);}
  .kgrid th,.kgrid td{border:1px solid var(--line);padding:11px 12px;vertical-align:middle;}
  .kgrid th{background:var(--label);color:var(--labeltx);font-weight:600;width:120px;text-align:center;white-space:nowrap;}
  .kgrid td.low{color:var(--hotred);font-weight:700;}
  .notice{background:#fff7e6;border:1px solid #f0d9a8;border-radius:10px;padding:18px;color:#9a6b0b;line-height:1.7;}
  .obtn{display:inline-block;margin-top:12px;background:var(--primary);color:#fff;border-radius:8px;padding:10px 18px;font-weight:600;}
  /* 부동산DB '전국' 스티커 — 점멸 + hover 시 좌우 기울기(프리미엄 스티커와 동일 형식) */
  @keyframes natlBlink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes natlWobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}55%{transform:rotate(9deg)}80%{transform:rotate(-4deg)}}
  .natllink{position:relative;}
  .natl-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;
    background:linear-gradient(180deg,#3f7ce2,#1f4fa3);border:1px solid #1a4590;border-radius:5px;
    padding:1px 7px;line-height:16px;white-space:nowrap;
    animation:natlBlink 1.5s ease-in-out infinite;transform-origin:center;
    position:absolute;top:3px;right:-15px;box-shadow:0 1px 5px rgba(20,60,120,.45);z-index:3;}
  .natllink:hover>.natl-badge{animation:natlWobble .55s ease-in-out;}
  @media(prefers-reduced-motion:reduce){.natl-badge{animation:none!important;}}
</style>
</head>
<body>
<div class="sitehead">
  <div class="top"><div class="topin">
    <div class="minicase">
      <span class="t">사건검색</span>
      <select id="caseYear"><option value="">전체</option></select>
      <span class="ty">타경</span>
      <input type="text" id="caseNoIn" placeholder="타경 번호" onkeydown="if(event.key==='Enter')caseSearch()">
      <button class="csearch" onclick="caseSearch()" aria-label="검색">🔍</button>
    </div>
    <a class="brand" href="/">JH<span>옥션스쿨</span></a>
    <div class="util" id="util"><a href="/static/login.html">로그인</a></div>
  </div></div>
  <div class="nav"><div class="navin">
    <a href="/static/auctions.html">경매검색</a>
    <a href="/static/board.html?b=yejung">예정</a><a href="/static/gongmae.html">공매</a>
    <a href="/static/board.html?b=video">강의</a><a href="/static/board.html?b=community">커뮤니티</a>
    <a href="/static/board.html?b=data">경매자료실</a><a class="natllink" href="/static/kbdb.html">부동산DB<span class="natl-badge">전국</span></a>
    <a href="/static/board.html?b=support">고객센터</a><a href="/static/mypage.html">마이페이지</a>
  </div></div>
</div>
<div class="wrap">
  <a class="back" href="/static/gongmae.html">← 공매 목록으로</a>
  <div id="root"><div class="card"><div class="sub">불러오는 중…</div></div></div>
</div>
<script>
const won=n=>{n=Math.round(+n||0); if(!n)return"-"; const e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4); let s=""; if(e)s+=e+"억 "; if(m)s+=m.toLocaleString()+"만"; if(!s)s=n.toLocaleString(); return s.trim()+"원";};
const row=(k,v)=>v?`<tr><th>${k}</th><td>${v}</td></tr>`:"";
function logout(){ fetch("/auth/logout",{method:"POST"}).then(function(){location.href="/";}); }
(function(){ var s=document.getElementById("caseYear"); if(!s)return; var n=new Date().getFullYear(); for(var y=n;y>=2008;y--){var o=document.createElement("option");o.value=y;o.textContent=y;s.appendChild(o);} })();
function caseSearch(){ var y=document.getElementById("caseYear").value, no=document.getElementById("caseNoIn").value.trim(); var p=new URLSearchParams(); if(y)p.set("year",y); if(no)p.set("keyword",no); location.href="/static/auctions.html"+(p.toString()?"?"+p.toString():""); }
fetch("/auth/me",{cache:"no-store"}).then(function(r){return r.json();}).then(function(u){ var el=document.getElementById("util"); if(!el)return; if(u&&(u.email||u.name)){ el.innerHTML='<span style="color:var(--primary);font-weight:600">'+(u.name||u.email)+'님</span> <a onclick="logout()">로그아웃</a> <a href="/static/mypage.html">정보수정</a> <a href="/static/mypage.html">마이페이지</a> <a href="/static/payment.html" class="pay">요금결제</a>'; } }).catch(function(){});
function load(){
  const root=document.getElementById("root");
  let d; try{ d=JSON.parse(sessionStorage.getItem("gm_item")||"null"); }catch(e){ d=null; }
  if(!d){ root.innerHTML='<div class="card"><div class="notice">목록에서 물건을 선택해 주세요.<br><a class="back" href="/static/gongmae.html">← 공매 목록</a></div></div>'; return; }
  const r=d.bid_ratio;
  root.innerHTML=`
    <div class="card">
      <div class="sub">${d.prop_type||""} · 물건관리번호 ${d.manage_no||"-"}</div>
      <h1>${d.name||"-"}</h1>
      <div class="sub">${d.address||""}</div>
    </div>
    ${d.thumb?`<div class="card" style="text-align:center"><img src="${d.thumb}" referrerpolicy="no-referrer" style="width:100%;max-width:460px;border-radius:8px;border:1px solid var(--line)" onerror="this.parentNode.style.display='none'"><div class="sub" style="margin-top:8px">※ 온비드 대표 이미지. 전체 사진은 '온비드에서 보기'에서 확인.</div></div>`:""}
    <div class="card"><table class="kgrid">
      ${row("소재지", d.address)}
      ${row("용도", d.usage)}
      ${row("재산종류", d.prop_type)}
      <tr><th>감정가</th><td>${won(d.appraisal_price)}</td></tr>
      <tr><th>최저입찰가</th><td class="low">${won(d.min_price)}${r!=null?` (${r}%)`:""}</td></tr>
      ${row("처분방식", d.disposal)}
      ${row("입찰방식", d.bid_method)}
      ${row("입찰시작", d.bid_begin)}
      ${row("입찰마감", d.bid_close)}
      ${row("집행기관", d.org)}
    </table>
    <a class="obtn" href="https://www.onbid.co.kr" target="_blank">온비드에서 보기 ↗</a>
    </div>`;
}
load();
</script>
<style>
#aibot-btn{position:fixed;right:22px;bottom:22px;width:60px;height:60px;border-radius:50%;background:#1a73e8;color:#fff;border:none;font-size:22px;font-weight:800;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 20px -4px rgba(26,115,232,.6);z-index:9998;display:flex;align-items:center;justify-content:center;transition:transform .15s;animation:aibotTilt 4.5s ease-in-out infinite,aibotGlow 2.2s ease-in-out infinite;transform-origin:center bottom;}
@keyframes aibotTilt{0%,84%,100%{transform:rotate(0)}88%{transform:rotate(-13deg)}92%{transform:rotate(13deg)}96%{transform:rotate(-6deg)}}
@keyframes aibotJump{0%,100%{transform:translateY(0)}45%{transform:translateY(-16px)}}
@keyframes aibotGlow{0%,100%{box-shadow:0 4px 13px -2px rgba(26,115,232,.5),0 0 10px 1px rgba(26,115,232,.35)}50%{box-shadow:0 4px 17px -2px rgba(26,115,232,.62),0 0 23px 5px rgba(26,115,232,.62)}}
#aibot-btn:hover{animation:aibotJump .55s ease,aibotGlow 2.2s ease-in-out infinite;}
#aibot-panel{position:fixed;right:22px;bottom:92px;width:360px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 130px);background:#fff;border-radius:16px;box-shadow:0 16px 50px -12px rgba(0,0,0,.4);z-index:9998;display:none;flex-direction:column;overflow:hidden;border:1px solid #e3e8ef;}
#aibot-panel.on{display:flex;}
.aibot-head{background:#1f4fa3;color:#fff;padding:14px 16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.aibot-head button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;}
#aibot-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f6f8fb;}
.aibot-msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;}
.aibot-msg.u{align-self:flex-end;background:#1f4fa3;color:#fff;border-bottom-right-radius:4px;}
.aibot-msg.a{align-self:flex-start;background:#fff;color:#1c1c1a;border:1px solid #e3e8ef;border-bottom-left-radius:4px;}
.aibot-input{display:flex;gap:8px;padding:12px;border-top:1px solid #eef1f5;background:#fff;}
.aibot-input input{flex:1;height:40px;border:1px solid #d5dce6;border-radius:10px;padding:0 12px;font-size:14px;outline:none;}
.aibot-input input:focus{border-color:#1f4fa3;}
.aibot-input button{height:40px;padding:0 16px;background:#1f4fa3;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.aibot-cards{display:flex;flex-direction:column;gap:10px;align-self:flex-start;width:100%;max-width:290px;}
.aibot-card{display:block;background:#fff;border:1px solid #e3e8ef;border-radius:12px;overflow:hidden;text-decoration:none;color:#1c1c1a;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.aibot-card:hover{border-color:#1a73e8;box-shadow:0 4px 14px rgba(26,115,232,.22);}
.aibot-card-img{position:relative;width:100%;height:150px;background:#eef2f8;}
.aibot-card-img img{width:100%;height:150px;object-fit:cover;display:block;}
.aibot-card-noimg{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:42px;}
.aibot-card-badge{position:absolute;top:8px;right:8px;background:#e8202a;color:#fff;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.aibot-card-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;}
.aibot-card-body{padding:10px 12px 11px;}
.aibot-card-case{font-size:13px;font-weight:800;color:#1f4fa3;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.aibot-card-addr{font-size:12px;color:#444;margin:3px 0 6px;line-height:1.45;}
.aibot-card-prices{font-size:13px;color:#1c1c1a;font-weight:700;}
.aibot-card-prices .k{color:#6b6a64;font-weight:400;font-size:11px;margin-right:1px;}
.aibot-card-grade{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.aibot-card-grade.g-ok{background:#e7f6ec;color:#1f7a3d;}.aibot-card-grade.g-mid{background:#fff4e0;color:#9a6b0b;}.aibot-card-grade.g-no{background:#fdeaea;color:#c0392b;}
</style>
<button id="aibot-btn" onclick="aibotToggle()" title="AI 도우미">AI</button>
<div id="aibot-panel">
  <div class="aibot-head"><span>🤖 JH옥션스쿨 AI 도우미</span><button onclick="aibotToggle()">✕</button></div>
  <div id="aibot-msgs"></div>
  <div class="aibot-input"><input id="aibot-in" placeholder="경매·사이트 이용, 무엇이든 물어보세요" onkeydown="if(event.key===String.fromCharCode(69,110,116,101,114))aibotSend()"><button onclick="aibotSend()">전송</button></div>
</div>
<script>
var aibotHist=[], aibotBusy=false, aibotSeen=[], aibotCtx={}, aibotLast=[];
function aibotWon(n){n=Math.round(+n||0);if(!n)return"";var e=Math.floor(n/1e8),m=Math.floor((n%1e8)/1e4);var s="";if(e)s+=e+"억";if(m)s+=(e?" ":"")+m.toLocaleString()+"만";return s||n.toLocaleString();}
function aibotCards(cards){
  var box=document.getElementById("aibot-msgs");
  var wrap=document.createElement("div"); wrap.className="aibot-cards";
  wrap.innerHTML=cards.map(function(c){
    var pf=c["예상차익"]; var badge=(pf&&pf>0)?('<span class="aibot-card-badge">+'+aibotWon(pf)+' 차익</span>'):"";
    var gr=c["매수판정"]; var gcls=gr==="매수양호"?"g-ok":(gr==="매수금지"?"g-no":"g-mid");
    var grade=gr?('<span class="aibot-card-grade '+gcls+'">'+gr+'</span>'):"";
    var th=c["thumb"]; var img=th?('<img src="'+th+'" onerror="this.parentNode.innerHTML=&#39;<div class=aibot-card-noimg>&#127968;</div>&#39;">'):'<div class="aibot-card-noimg">&#127968;</div>';
    var tag=c["유형"]?('<span class="aibot-card-tag">'+c["유형"]+'</span>'):"";
    var appr=c["감정가"]?('<span class="k">감정</span>'+aibotWon(c["감정가"])):"";
    var low=c["최저가"]?('<span class="k">최저</span>'+aibotWon(c["최저가"])):"";
    var est=c["시세"]?('<span class="k">시세</span>'+aibotWon(c["시세"])):"";
    return '<a class="aibot-card" href="'+(c["링크"]||"#")+'" target="_blank">'
      +'<div class="aibot-card-img">'+img+badge+tag+'</div>'
      +'<div class="aibot-card-body">'
      +'<div class="aibot-card-case">'+(c["사건번호"]||"물건")+grade+'</div>'
      +'<div class="aibot-card-addr">'+(c["소재지"]||"")+'</div>'
      +'<div class="aibot-card-prices">'+appr+(appr&&low?' · ':'')+low+((appr||low)&&est?' · ':'')+est+'</div>'
      +'</div></a>';
  }).join("");
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}
function aibotToggle(){
  var p=document.getElementById("aibot-panel");
  p.classList.toggle("on");
  if(p.classList.contains("on") && !aibotHist.length) aibotPush("a","안녕하세요! JH옥션스쿨 AI 도우미입니다. 권리분석·예상낙찰가·회원등급 등 궁금한 점을 물어보세요.");
  if(p.classList.contains("on")) document.getElementById("aibot-in").focus();
}
function aibotPush(role,text){
  var box=document.getElementById("aibot-msgs");
  var d=document.createElement("div");
  d.className="aibot-msg "+(role==="u"?"u":"a");
  d.textContent=text; box.appendChild(d); box.scrollTop=box.scrollHeight;
  return d;
}
async function aibotSend(){
  if(aibotBusy) return;
  var inp=document.getElementById("aibot-in");
  var msg=(inp.value||"").trim(); if(!msg) return;
  inp.value=""; aibotPush("u",msg); aibotHist.push({role:"user",content:msg});
  aibotBusy=true; var typing=aibotPush("a","…");
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},cache:"no-store",
      body:JSON.stringify({message:msg,history:aibotHist.slice(-20),seen:aibotSeen.slice(-40),ctx:aibotCtx,last:aibotLast})});
    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
</script>
</body>
</html>
