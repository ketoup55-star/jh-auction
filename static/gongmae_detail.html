<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공매물건 상세 — JH옥션스쿨</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#dfe3ea;--label:#eef2fb;--labeltx:#2c5db0;
        --text:#1c1c1a;--muted:#6b6a64;--primary:#1f4fa3;--danger:#c0392b;--hotred:#e8202a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  a{color:inherit;text-decoration:none;}
  .sitehead{position:sticky;top:0;z-index:50;}
  .top{background:var(--card);border-bottom:1px solid var(--line);}
  .topin{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px;}
  .minicase{display:flex;align-items:center;gap:6px;}
  .minicase .t{font-weight:600;color:var(--primary);font-size:13px;white-space:nowrap;}
  .minicase .ty{color:var(--muted);font-size:13px;white-space:nowrap;}
  .minicase select,.minicase input{height:30px;border:1px solid var(--line);border-radius:6px;padding:0 8px;font-size:12px;}
  .minicase input{width:150px;}
  .minicase .csearch{height:30px;width:34px;border:1px solid var(--primary);background:var(--primary);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;}
  .brand{flex:1;text-align:center;font-size:24px;font-weight:700;color:var(--primary);text-decoration:none;}.brand span{color:#3a7bd5;}
  .util{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;}
  .util a{color:var(--muted);text-decoration:none;cursor:pointer;}
  .util .pay{color:var(--danger);font-weight:600;}
  .nav{background:var(--card);border-bottom:2px solid var(--primary);}
  .navin{max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap;}
  .nav a{padding:14px 18px;font-size:15px;font-weight:600;color:#333;text-decoration:none;}
  .nav a:hover,.nav a.on{color:var(--primary);}
  .wrap{max-width:1180px;margin:18px auto;padding:0 16px;}
  .detail-grid{display:grid;grid-template-columns:minmax(0,1fr) 250px;gap:16px;align-items:start;}
  #gm-files-panel{position:sticky;top:120px;}
  @media(max-width:860px){ .detail-grid{grid-template-columns:1fr;} #gm-files-panel{position:static;} }
  .back{font-size:13px;color:var(--primary);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px;}
  h1{font-size:20px;font-weight:700;margin:6px 0 2px;}
  .sub{font-size:13px;color:var(--muted);}
  .kgrid{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);}
  .kgrid th,.kgrid td{border:1px solid var(--line);padding:11px 12px;vertical-align:middle;}
  .kgrid th{background:var(--label);color:var(--labeltx);font-weight:600;width:120px;text-align:center;white-space:nowrap;}
  .kgrid td.low{color:var(--hotred);font-weight:700;}
  .notice{background:#fff7e6;border:1px solid #f0d9a8;border-radius:10px;padding:18px;color:#9a6b0b;line-height:1.7;}
  .obtn{display:inline-block;margin-top:12px;background:var(--primary);color:#fff;border-radius:8px;padding:10px 18px;font-weight:600;}
  .addrrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:3px;}
  .obtn-inline{background:var(--primary);color:#fff;border-radius:6px;padding:5px 13px;font-weight:600;font-size:12px;white-space:nowrap;}
  .hgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .hcell{background:#fff;padding:11px 13px;display:flex;flex-direction:column;gap:5px;min-width:0;}
  .hcell .hl{font-size:11px;color:var(--labeltx);font-weight:700;}
  .hcell .hv{font-weight:600;font-size:13px;word-break:break-all;}
  .hcell .hv.low{color:var(--hotred);font-weight:700;}
  .gm-gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
  .gm-gal img{width:100%;height:180px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;background:#eef1f5;transition:border-color .12s,transform .12s;}
  @media(max-width:560px){ .gm-gal{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));} .gm-gal img{height:140px;} }
  .gm-gal img:hover{border-color:var(--primary);transform:scale(1.02);}
  /* 사진 라이트박스(캐러셀) */
  .lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:10000;display:none;align-items:center;justify-content:center;}
  .lb-ov.on{display:flex;}
  .lb-stage{position:relative;max-width:92vw;max-height:92vh;display:flex;align-items:center;justify-content:center;}
  .lb-stage img{max-width:92vw;max-height:86vh;object-fit:contain;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.6);background:#111;}
  .lb-arr{position:fixed;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;border:none;background:rgba(255,255,255,.22);color:#fff;font-size:32px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:10001;}
  .lb-arr:hover{background:rgba(255,255,255,.42);}
  .lb-prev{left:22px;}.lb-next{right:22px;}
  .lb-close{position:fixed;top:18px;right:22px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:26px;cursor:pointer;z-index:10001;}
  .lb-close:hover{background:rgba(255,255,255,.32);}
  .lb-count{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;font-weight:600;background:rgba(0,0,0,.55);padding:6px 16px;border-radius:20px;letter-spacing:.03em;}
  @media(max-width:860px){ .lb-prev{left:6px;}.lb-next{right:6px;} .lb-arr{width:44px;height:44px;font-size:24px;background:rgba(255,255,255,.28);} }
  /* 첨부파일 우측 세로 패널 */
  .fpanel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .fpanel .fphd{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .fpanel .fpitem{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:#fbfcfe;transition:border-color .12s,background .12s;}
  .fpanel .fpitem:last-child{margin-bottom:0;}
  .fpanel .fpitem:hover{border-color:var(--primary);background:#f2f7ff;}
  .fpanel .fpic{flex:0 0 auto;width:26px;height:32px;border-radius:4px;background:#e53935;color:#fff;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center;letter-spacing:.02em;}
  .fpanel .fpmeta{min-width:0;flex:1;}
  .fpanel .fpname{font-size:12px;font-weight:600;color:var(--text);word-break:break-all;line-height:1.35;}
  .fpanel .fpdl{font-size:11px;color:var(--primary);font-weight:600;margin-top:2px;}
  .fpanel .fpempty{color:var(--muted);font-size:12px;line-height:1.6;}
  /* 부동산DB '전국' 스티커 — 점멸 + hover 시 좌우 기울기(프리미엄 스티커와 동일 형식) */
  @keyframes natlBlink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes natlWobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}55%{transform:rotate(9deg)}80%{transform:rotate(-4deg)}}
  .natllink{position:relative;}
  .natl-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;
    background:linear-gradient(180deg,#3f7ce2,#1f4fa3);border:1px solid #1a4590;border-radius:5px;
    padding:1px 7px;line-height:16px;white-space:nowrap;
    animation:natlBlink 1.5s ease-in-out infinite;transform-origin:center;
    position:absolute;top:3px;right:-15px;box-shadow:0 1px 5px rgba(20,60,120,.45);z-index:3;}
  .natllink:hover>.natl-badge{animation:natlWobble .55s ease-in-out;}
  @media(prefers-reduced-motion:reduce){.natl-badge{animation:none!important;}}
  /* 매수판정 배지(경매 auctions.html .gbadge 1:1) */
  .gbadge{display:inline-block;font-size:12px;font-weight:800;border-radius:6px;padding:2px 10px;vertical-align:middle;}
  .gbadge.g-ok{background:#e7f7ee;color:#138a4e;border:1px solid #b6e6cb;}
  .gbadge.g-mid{background:#fdf3e2;color:#b9770f;border:1px solid #f3dcb0;}
  .gbadge.g-no{background:#fdecec;color:#d23030;border:1px solid #f4c4c4;}
  .gradehd{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .gradehd .cardhd{margin-bottom:0;}
  .gradecmt{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .gradecmt b.no{color:var(--danger);}.gradecmt b.ok{color:#138a4e;}.gradecmt b.mid{color:#b9770f;}
  /* 카드 소제목·표 공통 */
  .cardhd{font-weight:700;margin-bottom:10px;font-size:15px;}
  .gtag{display:inline-block;font-size:11px;font-weight:700;color:#2c5db0;background:#eef2fb;border-radius:5px;padding:1px 8px;margin-left:6px;vertical-align:middle;}
  .qbox4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:10px 0;}
  .qb{background:#fff;padding:9px 8px;text-align:center;}
  .qb .ql{font-size:11px;color:var(--muted);}.qb .qv{font-weight:700;font-size:13px;margin-top:2px;}.qb .qv.hot{color:var(--hotred);}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .tbl th,.tbl td{border:1px solid var(--line);padding:7px 9px;text-align:center;}
  .tbl th{background:var(--label);color:var(--labeltx);font-weight:600;white-space:nowrap;}
  .tbl td.amt{text-align:right;font-variant-numeric:tabular-nums;}.tbl td.low{color:var(--hotred);font-weight:700;}
  .scrollx{overflow-x:auto;}
  /* ── 경매 '실거래가 상세(유사 매물)' 컴포넌트 1:1 이식(auction.html 복사) ── */
  .mapsub{font-size:12px;font-weight:500;color:var(--muted);margin-left:6px;}
  .nbcard h2{font-size:16px;font-weight:700;margin:0 0 12px;}
  .elevseg{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
  .elevseg-lb{font-size:13px;font-weight:700;color:var(--primary);margin-right:2px;}
  .eseg{font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 12px;cursor:pointer;transition:.12s;}
  .eseg:hover{border-color:#9fb6e0;}
  .eseg.on{background:#1565ff;border-color:#1565ff;color:#fff;}
  .grpseg{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .grpseg-lb{font-size:13px;font-weight:700;color:var(--primary);margin-right:2px;}
  .gchip{font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 12px;cursor:pointer;transition:.12s;white-space:nowrap;}
  .gchip:hover{border-color:#9fb6e0;}
  .gchip.on{background:#1565ff;border-color:#1565ff;color:#fff;}
  .nb-scroll{max-height:240px;overflow:auto;}
  .nb-tbl{width:100%;border-collapse:collapse;}
  .nb-tbl th{background:#f7f9fc;color:var(--primary);font-weight:700;font-size:11.5px;padding:6px 5px;border:1px solid var(--line);white-space:nowrap;position:sticky;top:0;}
  .nb-tbl td{padding:6px 7px;border:1px solid var(--line);font-size:12px;text-align:center;}
  .nb-tbl td.amt{font-weight:800;color:var(--hotred);white-space:nowrap;}
  .nb-tbl td.bd{text-align:left;}
  .nb-tbl td.bd b{font-weight:700;}
  .nb-tbl td.adr2{text-align:left;color:var(--muted);font-size:11px;white-space:nowrap;}
  .nb-tbl td.gp{color:var(--muted);white-space:nowrap;}
  .nb-tbl td.yul{color:#7a3fd0;font-weight:700;}
  .nb-head{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px;gap:8px;flex-wrap:wrap;}
  .nb-title{font-size:15px;font-weight:800;color:var(--text);}
  .nb-apibadge{font-size:10.5px;font-weight:700;color:var(--primary);background:#eef3fc;border:1px solid #d4e0f5;border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
  .nb-headr{display:flex;align-items:center;gap:10px;}
  .nb-total{font-size:12.5px;color:var(--muted);font-weight:700;}
  .nb-xls{font-size:12px;font-weight:700;color:#1a7f4b;background:#eafaf1;border:1px solid #b6e6cb;border-radius:8px;padding:6px 12px;cursor:pointer;}
  .nb-xls:hover{background:#d8f3e3;}
  .nb-subt{font-size:12px;color:var(--muted);margin:2px 0 12px;line-height:1.55;}
  .nb-subt .nb-hl{color:var(--primary);font-weight:700;}
  .nb-subt .nb-hl2{color:#1a7f4b;font-weight:700;}
  .nb-subt .nb-hl3{color:#7a3fd0;font-weight:700;}
  .nb-subt .nb-prop{display:block;margin-top:5px;}
  .acc{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;}
  .acc-h{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;background:#fafbfd;cursor:pointer;user-select:none;}
  .acc-h:hover{background:#f3f6fb;}
  .acc.open .acc-h{background:#eef3fc;}
  .acc-hl{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .acc-name{font-weight:800;font-size:13px;color:var(--text);}
  .acc-cnt{font-size:11.5px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 8px;}
  .acc-badge{font-size:10.5px;font-weight:800;color:#fff;border-radius:6px;padding:3px 9px;}
  .acc-badge.red{background:#e8202a;}
  .acc-badge.blue{background:#1f6fe0;}
  .acc-badge.gray{background:#8a93a3;}
  .acc-hr{display:flex;align-items:center;gap:12px;white-space:nowrap;}
  .acc-avg{font-size:12px;color:var(--primary);font-weight:700;}
  .acc-avg .acc-yul{color:var(--muted);font-weight:600;}
  .acc-chev{font-size:12px;color:var(--muted);transition:transform .15s;}
  .acc.open .acc-chev{transform:rotate(180deg);}
  .acc-b{display:none;border-top:1px solid var(--line);}
  .acc.open .acc-b{display:block;}
  /* 유사거래 지도 핀 */
  .mflag{width:24px;height:24px;background:#1a73e8;border:2px solid #fff;border-radius:50% 50% 50% 0;box-shadow:0 2px 5px rgba(0,0,0,.4);transform:rotate(-45deg) translate(5px,-5px);cursor:pointer;position:relative;}
  .mflag::after{content:"";position:absolute;top:50%;left:50%;width:8px;height:8px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);}
  .mflag:hover{background:#1257c4;}
  .mflag.subject{width:30px;height:30px;background:#e23b2e;border-width:2.5px;z-index:10;transform:rotate(-45deg) translate(7px,-7px);}
  .mflag.subject::after{width:10px;height:10px;}
  .mflag.subject:hover{background:#c62828;}
  .mpop{position:relative;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 3px 12px rgba(0,0,0,.25);padding:9px 26px 9px 12px;min-width:140px;white-space:nowrap;}
  .mpop::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff;}
  .mpop-x{position:absolute;top:4px;right:5px;border:none;background:none;font-size:16px;line-height:1;color:var(--muted);cursor:pointer;padding:2px 4px;}
  .mpop-x:hover{color:var(--hotred);}
  .mpop-nm{font-weight:700;font-size:13px;color:var(--text);}.mpop-ad{font-size:11px;color:var(--muted);margin-top:1px;}
  .mpop-rw{font-size:12px;color:var(--text);margin-top:4px;}.mpop-amt{font-size:14px;font-weight:800;color:var(--hotred);margin-top:2px;}
  /* 입찰정보(공고정보·공고문·첨부) */
  .niinfo{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .niinfo .ni{background:#fff;padding:9px 12px;display:flex;gap:8px;}
  .niinfo .ni .nk{color:var(--labeltx);font-weight:700;font-size:11.5px;flex:0 0 76px;}
  .niinfo .ni .nv{font-size:12.5px;word-break:break-all;}
  .noticebox{background:#fbfbfd;border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-top:10px;font-size:12.5px;line-height:1.6;}
  .noticebox .nlab{color:var(--labeltx);font-weight:700;margin-right:6px;}
  .noticebox .nrow{padding:4px 0;border-bottom:1px dashed #eef1f5;white-space:pre-wrap;}
  .noticebox .nrow:last-child{border-bottom:none;}
  .filelist{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
  .filelink{display:inline-flex;align-items:center;gap:7px;background:#eef3ff;border:1px solid #c4d6ff;border-radius:7px;padding:7px 12px;font-size:12.5px;font-weight:600;color:#1565ff;width:fit-content;}
  .filelink:hover{background:#dde8ff;}
  /* 단기매도 계산기 */
  .dg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px 10px;margin-bottom:10px}
  .dg-grid label{font-size:12px;color:#5b6573;display:flex;align-items:center;gap:3px}
  .dg-grid input,.dg-grid select{flex:1;min-width:0;width:100%;border:1px solid #cdd5e2;border-radius:5px;padding:4px 5px;font-size:12.5px}
  .dg-grid span{color:#9aa0a6;font-size:11px;flex:none}
  .dg-grid .dgl{width:66px;flex:none;color:#5b6573;font-size:12px;white-space:nowrap;overflow:hidden}
  .dg-out{background:#f7f9fc;border:1px solid #e8ebf0;border-radius:8px;padding:7px 11px;max-width:580px}
  .dg-orow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px dashed #edf0f4}
  .dg-orow:last-child{border-bottom:none}.dg-orow b{font-weight:700}
  .dg-note{color:#9aa0a6;font-size:12px;margin-top:7px;line-height:1.5}
  .ss-sec{font-size:11.5px;font-weight:700;color:#2a6f97;margin:3px 0 6px;padding-bottom:3px;border-bottom:1px solid #eef1f5}
  .ss-acqwrap{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px}
  .ss-acqbox{background:#f7f9fc;border:1px solid #e8ebf0;border-radius:8px;padding:7px 11px;flex:1 1 300px}
  .ss-acqhd{font-size:11.5px;font-weight:700;color:#2a6f97;margin-bottom:2px}
  .ss-acqbox .dg-orow{font-size:12px;padding:2px 0}
  .ss-acqtot{border-top:1px solid #d8dee8;font-weight:700;margin-top:2px}.ss-acqtot b{color:#c0392b}
  .ss-acqref{flex:1 1 260px;max-width:340px;background:#fbfbfd;border:1px solid #e8ebf0;border-radius:8px;padding:7px 11px}
  .ss-reftbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:3px}
  .ss-reftbl th,.ss-reftbl td{border:1px solid #eef1f5;padding:3px 5px;text-align:center}
  .ss-reftbl th{background:#f3f6fa;color:#5b6573;font-weight:600}.ss-reftbl tr.on td{background:#fff3d6;font-weight:700;color:#9a6b0b}
  /* 경쟁매물 토글 */
  .kb-toggle{width:100%;text-align:left;background:#f2f7ff;border:1px solid #cfe0ff;border-radius:8px;padding:11px 14px;font-size:14px;font-weight:700;color:#1f4fa3;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .kb-sub{font-weight:400;color:var(--muted);font-size:12px;}.kb-arr{margin-left:auto;transition:transform .2s;}
  .kb-open>.kb-toggle .kb-arr{transform:rotate(180deg);}
  .kb-body{display:none;margin-top:10px;}.kb-open>.kb-body{display:block;}
</style>
</head>
<body>
<div class="sitehead">
  <div class="top"><div class="topin">
    <div class="minicase">
      <span class="t">사건검색</span>
      <select id="caseYear"><option value="">전체</option></select>
      <span class="ty">타경</span>
      <input type="text" id="caseNoIn" placeholder="타경 번호" onkeydown="if(event.key==='Enter')caseSearch()">
      <button class="csearch" onclick="caseSearch()" aria-label="검색">🔍</button>
    </div>

        +'<div class="gm-gal">'+GM_PHOTOS.map(function(u,i){return '<img src="'+u+'" referrerpolicy="no-referrer" loading="lazy" onclick="openLightbox('+i+')" onerror="this.style.display=\'none\'">';}).join("")+'</div>';
    }

  loadGmBidInfo(d, e);   // 입찰정보(회차 일정·공고정보·공고문) — 모든 용도

// ─────────────────────────── 사진 라이트박스(캐러셀) ───────────────────────────
var GM_PHOTOS=[], _lbIdx=0;

function _lbShow(){

async function loadGmBidInfo(d, e){

var GM_D=null, GM_APT=null, GM_EST=null, GM_XB=null, GM_NB=null;   // 계산기·지도 프리필용
async function loadGmFeatures(d, e){

  // ① 유사거래(지도+실거래상세)는 입찰일정 바로 아래 = 독립 컨테이너(#gm-nearby)에 렌더(레이아웃 순서: 주인님 지정)
  if(nb.available) loadGmNearby(nb);

  box.innerHTML=html;
  // ③ 시세·예상낙찰가·매수판정 카드 = #gm-grade-top(물건사진 위 — 주인님 지정)
  var sise=est.available?est.price:null;
  var gradeHtml="";
  if(sise){ gradeHtml='<div class="card"><div class="gradehd"><div class="cardhd">💰 시세·예상낙찰가·매수판정</div><span id="gm-gradebadge"></span></div><div class="hgrid">'
    +gmHcell("추정 시세",won(sise))
    +'<div class="hcell"><span class="hl">예상 낙찰가</span><span class="hv" id="gm-bidcell">계산 중…</span></div>'
    +'<div class="hcell"><span class="hl">예상 차익</span><span class="hv" id="gm-profitcell">계산 중…</span></div>'

          rateTot:Math.round((base+base*0.1+(over85?0.2:0))*100)/100};

  if(aibotBusy) return;
  var inp=document.getElementById("aibot-in");
  var msg=(inp.value||"").trim(); if(!msg) return;
  inp.value=""; aibotPush("u",msg); aibotHist.push({role:"user",content:msg});
  aibotBusy=true; var typing=aibotPush("a","…");
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},cache:"no-store",
      body:JSON.stringify({message:msg,history:aibotHist.slice(-20),seen:aibotSeen.slice(-40),ctx:aibotCtx,last:aibotLast})});
    var d=await r.json();
    typing.textContent=d.reply||"죄송합니다. 답변을 받지 못했습니다.";
    aibotHist.push({role:"assistant",content:typing.textContent+(d.list_text||"")}); if(d.used_args&&Object.keys(d.used_args).length)aibotCtx=d.used_args; if(d.cards&&d.cards.length){aibotLast=d.cards;aibotCards(d.cards);d.cards.forEach(function(c){if(c.item_key)aibotSeen.push(c.item_key);});}
  }catch(e){ typing.textContent="죄송합니다. 연결 오류가 발생했습니다."; }
  aibotBusy=false;
}
</script>
</body>
</html>
